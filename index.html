<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Portfolio Game - Tech Skills Showcase</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            border-left: 4px solid #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
            display: flex;
            gap: 30px;
        }
        
        .key {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            color: #00ff88;
            font-weight: bold;
        }
        
        #skills-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.2);
            z-index: 100;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }
        
        #skills-panel h3 {
            margin: 0 0 15px 0;
            color: #00ff88;
            font-size: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            margin: 12px 0;
            padding: 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            transition: transform 0.3s;
        }
        
        .skill-item:hover {
            transform: translateX(-5px);
            background: rgba(0,255,136,0.1);
        }
        
        .skill-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
        }
        
        .skill-name {
            flex: 1;
            font-weight: bold;
        }
        
        .skill-level {
            color: #00ff88;
            font-size: 14px;
        }
        
        .skill-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        
        #center-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(0,255,136,0.5);
            background: rgba(0,0,0,0.6);
            padding: 20px 40px;
            border-radius: 60px;
            border: 2px solid #00ff88;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 200;
            backdrop-filter: blur(5px);
        }
        
        #camera-status {
            position: absolute;
            bottom: 100px;
            right: 20px;
            color: #00ff88;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #00ff88;
            z-index: 100;
        }
        
        #reset-btn {
            position: absolute;
            top: 20px;
            right: 240px;
            background: rgba(255,0,0,0.7);
            border: 2px solid #ff4444;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            z-index: 100;
        }
        
        #reset-btn:hover {
            background: #ff4444;
            transform: scale(1.05);
        }
        
        #boundary-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 18px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid #ff4444;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 300;
        }
    </style>
</head>
<body>
    <div id="info">🎮 Tech Stack Portfolio | Câmera Estabilizada</div>
    
    <div id="skills-panel">
        <h3>⚡ Tech Stack</h3>
        <div class="skill-item">
            <div class="skill-dot" style="background: #f89820;"></div>
            <span class="skill-icon">☕</span>
            <span class="skill-name">Java</span>
            <span class="skill-level">★★★★★</span>
        </div>
        <div class="skill-item">
            <div class="skill-dot" style="background: #e34c26;"></div>
            <span class="skill-icon">🌐</span>
            <span class="skill-name">HTML</span>
            <span class="skill-level">★★★★★</span>
        </div>
        <div class="skill-item">
            <div class="skill-dot" style="background: #2965f1;"></div>
            <span class="skill-icon">🎨</span>
            <span class="skill-name">CSS</span>
            <span class="skill-level">★★★★★</span>
        </div>
        <div class="skill-item">
            <div class="skill-dot" style="background: #68a063;"></div>
            <span class="skill-icon">🟢</span>
            <span class="skill-name">Node.js</span>
            <span class="skill-level">★★★★☆</span>
        </div>
        <div class="skill-item">
            <div class="skill-dot" style="background: #6db33f;"></div>
            <span class="skill-icon">🍃</span>
            <span class="skill-name">Spring Boot</span>
            <span class="skill-level">★★★★☆</span>
        </div>
    </div>
    
    <button id="reset-btn">⟲ Resetar Câmera</button>
    
    <div id="camera-status">
        Distância: <span id="cam-distance">0</span>m | Y: <span id="cam-y">0</span>m
    </div>
    
    <div id="controls">
        <span><span class="key">WASD</span> Move</span>
        <span><span class="key">Mouse</span> Olhar</span>
        <span><span class="key">R</span> Reset</span>
    </div>
    
    <div id="center-message">✨ Mantenha-se dentro da arena! ✨</div>
    <div id="boundary-warning">⚠️ Volte para a arena! ⚠️</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // Elementos UI
        const camDistanceSpan = document.getElementById('cam-distance');
        const camYSpan = document.getElementById('cam-y');
        const boundaryWarning = document.getElementById('boundary-warning');
        const resetBtn = document.getElementById('reset-btn');
        
        // Limites da arena
        const ARENA_SIZE = 12;
        const MIN_Y = 1;
        const MAX_Y = 8;
        const CENTER = new THREE.Vector3(0, 2, 0);
        
        // Posição inicial da câmera
        const INITIAL_CAMERA_POS = new THREE.Vector3(8, 4, 10);
        
        // Inicializar cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 15, 30);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.copy(INITIAL_CAMERA_POS);
        
        // Renderers
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Controls com limites
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2.2; // Impede de ir muito para baixo
        controls.minDistance = 4;
        controls.maxDistance = 15; // LIMITE PRINCIPAL - não deixa afastar demais
        controls.target.set(0, 2, 0);
        controls.enableZoom = true;
        controls.zoomSpeed = 0.5;
        
        // Iluminação
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        scene.add(dirLight);
        
        // Luzes coloridas para as plataformas
        const colors = [0xf89820, 0xe34c26, 0x2965f1, 0x68a063, 0x6db33f];
        
        // Parede invisível para delimitar a arena (apenas visual)
        const wallMaterial = new THREE.LineBasicMaterial({ color: 0x00ff88, opacity: 0.2, transparent: true });
        
        // Criar um círculo no chão marcando o limite
        const boundaryRingGeo = new THREE.TorusGeometry(ARENA_SIZE, 0.1, 16, 64);
        const boundaryRingMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x004422, transparent: true, opacity: 0.3 });
        const boundaryRing = new THREE.Mesh(boundaryRingGeo, boundaryRingMat);
        boundaryRing.rotation.x = Math.PI / 2;
        boundaryRing.position.y = 0.05;
        scene.add(boundaryRing);
        
        // Adicionar postes de limite
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const x = Math.cos(angle) * ARENA_SIZE;
            const z = Math.sin(angle) * ARENA_SIZE;
            
            const poleGeo = new THREE.CylinderGeometry(0.1, 0.2, 1, 6);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x004422 });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.set(x, 0.5, z);
            scene.add(pole);
        }
        
        // Chão
        const groundGeometry = new THREE.CircleGeometry(ARENA_SIZE + 2, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e,
            roughness: 0.6,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Grid
        const gridHelper = new THREE.GridHelper(ARENA_SIZE * 2, 20, 0x00ff88, 0x3366aa);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);
        
        // Criar plataformas
        const skills = [
            { name: 'Java', color: 0xf89820, posX: -4, posZ: -3, icon: '☕', level: 5 },
            { name: 'HTML', color: 0xe34c26, posX: 4, posZ: -3, icon: '🌐', level: 5 },
            { name: 'CSS', color: 0x2965f1, posX: -4, posZ: 3, icon: '🎨', level: 5 },
            { name: 'Node.js', color: 0x68a063, posX: 0, posZ: 0, icon: '🟢', level: 4 },
            { name: 'Spring Boot', color: 0x6db33f, posX: 4, posZ: 3, icon: '🍃', level: 4 }
        ];
        
        const platforms = [];
        
        skills.forEach((skill) => {
            const platformGroup = new THREE.Group();
            platformGroup.position.set(skill.posX, 0.5, skill.posZ);
            
            // Base
            const baseGeo = new THREE.CylinderGeometry(2.0, 2.0, 0.4, 32);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.2;
            base.receiveShadow = true;
            base.castShadow = true;
            platformGroup.add(base);
            
            // Plataforma principal
            const discGeo = new THREE.CylinderGeometry(1.6, 1.6, 0.5, 32);
            const discMat = new THREE.MeshStandardMaterial({ 
                color: skill.color,
                emissive: new THREE.Color(skill.color).multiplyScalar(0.2),
                roughness: 0.3,
                metalness: 0.5
            });
            const disc = new THREE.Mesh(discGeo, discMat);
            disc.position.y = 0.7;
            disc.castShadow = true;
            disc.receiveShadow = true;
            platformGroup.add(disc);
            
            // Anel
            const ringGeo = new THREE.TorusGeometry(1.3, 0.06, 16, 64);
            const ringMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff,
                emissive: new THREE.Color(skill.color)
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 1.0;
            platformGroup.add(ring);
            
            // Pilar
            const pillarGeo = new THREE.CylinderGeometry(0.25, 0.35, 1.8, 8);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
            const pillar = new THREE.Mesh(pillarGeo, pillarMat);
            pillar.position.y = 1.6;
            pillar.castShadow = true;
            platformGroup.add(pillar);
            
            // Ícone
            const iconDiv = document.createElement('div');
            iconDiv.textContent = skill.icon;
            iconDiv.style.fontSize = '48px';
            iconDiv.style.textShadow = `0 0 20px ${new THREE.Color(skill.color).getStyle()}`;
            iconDiv.style.filter = 'drop-shadow(0 0 10px rgba(0,255,136,0.5))';
            
            const iconLabel = new CSS2DObject(iconDiv);
            iconLabel.position.set(0, 2.4, 0);
            platformGroup.add(iconLabel);
            
            // Nome
            const nameDiv = document.createElement('div');
            nameDiv.textContent = skill.name;
            nameDiv.style.color = 'white';
            nameDiv.style.fontSize = '16px';
            nameDiv.style.fontWeight = 'bold';
            nameDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
            nameDiv.style.padding = '4px 12px';
            nameDiv.style.borderRadius = '16px';
            nameDiv.style.border = `2px solid ${new THREE.Color(skill.color).getStyle()}`;
            
            const nameLabel = new CSS2DObject(nameDiv);
            nameLabel.position.set(0, 3.0, 0);
            platformGroup.add(nameLabel);
            
            scene.add(platformGroup);
            
            platforms.push({
                group: platformGroup,
                speed: 0.3 + Math.random() * 0.3,
                offset: Math.random() * Math.PI * 2,
                ring: ring,
                posX: skill.posX,
                posZ: skill.posZ,
                name: skill.name,
                color: skill.color
            });
            
            // Partículas
            const particleCount = 20;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 2;
                const radius = 2.8;
                const height = Math.sin(angle * 3) * 1.5;
                
                particlePositions[i*3] = Math.cos(angle) * radius;
                particlePositions[i*3+1] = 1.8 + height;
                particlePositions[i*3+2] = Math.sin(angle) * radius;
            }
            
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            
            const particleMat = new THREE.PointsMaterial({ 
                size: 0.15, 
                color: skill.color,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            const particles = new THREE.Points(particleGeo, particleMat);
            particles.position.set(skill.posX, 0, skill.posZ);
            scene.add(particles);
            
            // Círculo no chão
            const circleGeo = new THREE.CircleGeometry(2.0, 32);
            const circleMat = new THREE.MeshStandardMaterial({ 
                color: skill.color, 
                transparent: true, 
                opacity: 0.15,
                side: THREE.DoubleSide
            });
            const circle = new THREE.Mesh(circleGeo, circleMat);
            circle.rotation.x = -Math.PI / 2;
            circle.position.set(skill.posX, 0.02, skill.posZ);
            scene.add(circle);
        });
        
        // Estrelas
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 100;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 30;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        const messageEl = document.getElementById('center-message');
        
        // Estado do teclado
        const keyState = {
            w: false, a: false, s: false, d: false,
            r: false
        };
        
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = true; e.preventDefault(); break;
                case 'KeyA': keyState.a = true; e.preventDefault(); break;
                case 'KeyS': keyState.s = true; e.preventDefault(); break;
                case 'KeyD': keyState.d = true; e.preventDefault(); break;
                case 'KeyR': 
                    keyState.r = true; 
                    resetCamera();
                    e.preventDefault(); 
                    break;
            }
        });
        
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = false; e.preventDefault(); break;
                case 'KeyA': keyState.a = false; e.preventDefault(); break;
                case 'KeyS': keyState.s = false; e.preventDefault(); break;
                case 'KeyD': keyState.d = false; e.preventDefault(); break;
                case 'KeyR': keyState.r = false; e.preventDefault(); break;
            }
        });
        
        // Função para resetar câmera
        function resetCamera() {
            camera.position.copy(INITIAL_CAMERA_POS);
            controls.target.set(0, 2, 0);
            controls.update();
            
            messageEl.textContent = '✨ Câmera resetada! ✨';
            messageEl.style.opacity = '1';
            setTimeout(() => {
                messageEl.style.opacity = '0';
            }, 2000);
        }
        
        resetBtn.addEventListener('click', resetCamera);
        
        // Função para limitar posição da câmera
        function limitCameraPosition() {
            let needsCorrection = false;
            const pos = camera.position;
            
            // Limite horizontal (círculo)
            const distanceFromCenter = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
            
            if (distanceFromCenter > ARENA_SIZE) {
                // Normalizar e trazer para dentro do limite
                const angle = Math.atan2(pos.z, pos.x);
                pos.x = Math.cos(angle) * ARENA_SIZE * 0.95;
                pos.z = Math.sin(angle) * ARENA_SIZE * 0.95;
                needsCorrection = true;
            }
            
            // Limite vertical
            if (pos.y < MIN_Y) {
                pos.y = MIN_Y;
                needsCorrection = true;
            } else if (pos.y > MAX_Y) {
                pos.y = MAX_Y;
                needsCorrection = true;
            }
            
            // Mostrar aviso se estiver perto da borda
            if (distanceFromCenter > ARENA_SIZE * 0.8) {
                boundaryWarning.style.opacity = '0.8';
                setTimeout(() => {
                    boundaryWarning.style.opacity = '0';
                }, 500);
            }
            
            return needsCorrection;
        }
        
        // Função de movimento com limites
        function moveCamera() {
            const speed = 0.1;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            
            forward.y = 0;
            forward.normalize();
            right.y = 0;
            right.normalize();
            
            const oldPos = camera.position.clone();
            
            if (keyState.w) camera.position.addScaledVector(forward, speed);
            if (keyState.s) camera.position.addScaledVector(forward, -speed);
            if (keyState.a) camera.position.addScaledVector(right, -speed);
            if (keyState.d) camera.position.addScaledVector(right, speed);
            
            // Aplicar limites
            const corrected = limitCameraPosition();
            
            // Se corrigiu, não atualizar o target bruscamente
            if (!corrected) {
                controls.target.set(camera.position.x, camera.position.y - 1, camera.position.z - 2);
            } else {
                controls.target.set(camera.position.x, Math.max(1, camera.position.y - 1), camera.position.z - 2);
            }
        }
        
        // Click interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        renderer.domElement.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const platformDiscs = platforms.map(p => p.group.children[1]);
            const intersects = raycaster.intersectObjects(platformDiscs);
            
            if (intersects.length > 0) {
                const hitDisc = intersects[0].object;
                const platform = platforms.find(p => p.group.children[1] === hitDisc);
                if (platform) {
                    messageEl.textContent = `✨ ${platform.name} ✨`;
                    messageEl.style.opacity = '1';
                    setTimeout(() => {
                        messageEl.style.opacity = '0';
                    }, 1500);
                }
            }
        });
        
        // Atualizar UI
        function updateUI() {
            const distance = Math.sqrt(
                camera.position.x * camera.position.x + 
                camera.position.z * camera.position.z
            ).toFixed(1);
            
            camDistanceSpan.textContent = distance;
            camYSpan.textContent = camera.position.y.toFixed(1);
        }
        
        // Mensagem inicial
        setTimeout(() => {
            messageEl.style.opacity = '1';
            messageEl.textContent = '🚫 Fique dentro do círculo verde! 🚫';
            setTimeout(() => {
                messageEl.style.opacity = '0';
            }, 3000);
        }, 1000);
        
        // Animation loop
        let clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;
            
            // Mover câmera
            moveCamera();
            
            // Animar plataformas
            platforms.forEach((platform) => {
                platform.group.position.y = 0.5 + Math.sin(elapsedTime * platform.speed + platform.offset) * 0.15;
                platform.group.rotation.y += 0.002;
                
                if (platform.ring) {
                    platform.ring.rotation.z += 0.005;
                }
            });
            
            // Rotacionar estrelas lentamente
            stars.rotation.y += 0.0001;
            
            // Atualizar controles
            controls.update();
            
            // Atualizar UI
            updateUI();
            
            // Render
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // Window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
