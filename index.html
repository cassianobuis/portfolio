<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Java Realm | Currículo Interativo 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            overflow: hidden;
            background: #0a0a14;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            border-left: 4px solid #f89820;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ccc;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid #f89820;
            z-index: 100;
        }

        #controls span {
            color: #f89820;
            font-weight: bold;
        }

        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid;
            min-width: 120px;
            text-align: center;
        }

        .stat-box.achievements {
            border-color: #f89820;
            color: #f89820;
        }

        .stat-box.codes {
            border-color: #00ffff;
            color: #00ffff;
        }

        #info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #f89820;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: white;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 50px rgba(248, 152, 32, 0.5);
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 30px rgba(248, 152, 32, 0.5); }
            50% { box-shadow: 0 0 60px rgba(248, 152, 32, 0.8); }
            100% { box-shadow: 0 0 30px rgba(248, 152, 32, 0.5); }
        }

        #info-card h2 {
            color: #f89820;
            margin-bottom: 20px;
            font-size: 28px;
            border-bottom: 2px solid #f89820;
            padding-bottom: 10px;
        }

        #info-card h3 {
            color: #f89820;
            margin: 15px 0 10px;
            font-size: 20px;
        }

        #info-card p {
            line-height: 1.6;
            margin-bottom: 10px;
            color: #ddd;
        }

        #info-card ul {
            list-style: none;
            padding-left: 0;
        }

        #info-card li {
            padding: 8px 15px;
            margin: 5px 0;
            background: rgba(248, 152, 32, 0.1);
            border-left: 3px solid #f89820;
            border-radius: 0 10px 10px 0;
            color: #fff;
        }

        .skill-tag {
            display: inline-block;
            background: rgba(248, 152, 32, 0.2);
            border: 1px solid #f89820;
            padding: 5px 15px;
            margin: 5px;
            border-radius: 20px;
            font-size: 14px;
            color: #f89820;
        }

        .close-btn {
            background: transparent;
            border: 2px solid #f89820;
            color: #f89820;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #f89820;
            color: #000;
        }

        #toast {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(248, 152, 32, 0.9);
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(248, 152, 32, 0.5);
            pointer-events: none;
        }

        #mobile-joystick {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            border: 2px solid #f89820;
            display: none;
            z-index: 1000;
            touch-action: none;
        }

        @media (max-width: 768px) {
            #controls {
                display: none;
            }
            #mobile-joystick {
                display: block;
            }
            .stat-box {
                padding: 8px 12px;
                font-size: 14px;
                min-width: 100px;
            }
        }

        #legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            border: 1px solid #f89820;
            z-index: 100;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div id="info">🐍 Java Realm - Cobra Cresce com Conquistas!</div>
    
    <div id="stats">
        <div class="stat-box achievements">🏆 <span id="achievements-count">0</span>/10</div>
        <div class="stat-box codes">💾 <span id="cubes-collected">0</span>/8</div>
    </div>

    <div id="controls">
        <span>WASD</span> para mover a cobra | <span>ESC</span> fechar janela
    </div>

    <div id="legend">
        <div class="legend-item"><span class="color-dot" style="background: #f89820;"></span> ⚡ Skills</div>
        <div class="legend-item"><span class="color-dot" style="background: #00ffff;"></span> 📁 Projetos</div>
        <div class="legend-item"><span class="color-dot" style="background: #ff44aa;"></span> 🎓 Formação</div>
        <div class="legend-item"><span class="color-dot" style="background: #2ecc71;"></span> 💼 Experiência</div>
        <div class="legend-item"><span class="color-dot" style="background: #ff0000;"></span> 📫 Contato</div>
    </div>

    <div id="info-card">
        <h2 id="card-title"></h2>
        <div id="card-content"></div>
        <button class="close-btn" onclick="closeInfoCard()">FECHAR</button>
    </div>

    <div id="toast"></div>
    <div id="mobile-joystick"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Configuração inicial
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);
        scene.fog = new THREE.Fog(0x0a0a14, 20, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Luzes
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        directionalLight.position.set(10, 20, 5);
        directionalLight.castShadow = true;
        directionalLight.receiveShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 50;
        directionalLight.shadow.camera.left = -20;
        directionalLight.shadow.camera.right = 20;
        directionalLight.shadow.camera.top = 20;
        directionalLight.shadow.camera.bottom = -20;
        scene.add(directionalLight);

        // Chão
        const groundGeometry = new THREE.CircleGeometry(60, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e,
            roughness: 0.4,
            metalness: 0.1,
            emissive: 0x050510
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid decorativo
        const gridHelper = new THREE.GridHelper(80, 40, 0xf89820, 0x335588);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // ===== COBRA CORRIGIDA =====
        const snakeGroup = new THREE.Group();
        snakeGroup.position.y = 0.5; // Altura correta para não afundar
        
        // Tamanho base da cobra
        let snakeSize = 1.0;
        const maxSnakeSize = 2.5;
        
        // Função para atualizar o tamanho da cobra
        function updateSnakeSize() {
            const scaleFactor = 1.0 + (achievementsCount / markers.length) * 1.5;
            snakeSize = Math.min(scaleFactor, maxSnakeSize);
            
            // Aplica escala em todos os elementos
            snakeGroup.children.forEach(child => {
                if (child.geometry) {
                    child.scale.set(snakeSize, snakeSize, snakeSize);
                }
            });
            
            showToast(`🐍 Cobra cresceu! Tamanho: ${(snakeSize * 100).toFixed(0)}%`);
        }
        
        // Cabeça da cobra (posicionada corretamente)
        const headGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88,
            emissive: 0x004422,
            emissiveIntensity: 1
        });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.set(0, 0.3, 0.8); // Ajustado para ficar acima do chão
        head.castShadow = true;
        head.receiveShadow = true;
        snakeGroup.add(head);

        // Olhos
        const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        
        const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
        eye1.position.set(0.25, 0.4, 1.1);
        snakeGroup.add(eye1);
        
        const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
        eye2.position.set(-0.25, 0.4, 1.1);
        snakeGroup.add(eye2);
        
        // Pupilas
        const pupilGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        
        const pupil1 = new THREE.Mesh(pupilGeo, pupilMat);
        pupil1.position.set(0.28, 0.38, 1.15);
        snakeGroup.add(pupil1);
        
        const pupil2 = new THREE.Mesh(pupilGeo, pupilMat);
        pupil2.position.set(-0.28, 0.38, 1.15);
        snakeGroup.add(pupil2);

        // Língua
        const tongueGeo = new THREE.ConeGeometry(0.08, 0.3, 8);
        const tongueMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
        const tongue = new THREE.Mesh(tongueGeo, tongueMat);
        tongue.position.set(0, 0.2, 1.3);
        tongue.rotation.x = 0.2;
        snakeGroup.add(tongue);

        // Corpo (segmentos) - todos na altura correta
        const bodySegments = [];
        const segmentCount = 5;
        for (let i = 1; i <= segmentCount; i++) {
            const segmentGeo = new THREE.SphereGeometry(0.5, 24, 24);
            const segmentMat = new THREE.MeshStandardMaterial({ 
                color: 0x00cc66,
                emissive: 0x003311
            });
            const segment = new THREE.Mesh(segmentGeo, segmentMat);
            segment.position.set(0, 0.3, -i * 0.7); // Altura consistente
            segment.castShadow = true;
            segment.receiveShadow = true;
            snakeGroup.add(segment);
            bodySegments.push(segment);
        }

        // Cauda
        const tailGeo = new THREE.ConeGeometry(0.4, 0.8, 8);
        const tailMat = new THREE.MeshStandardMaterial({ color: 0x009944 });
        const tail = new THREE.Mesh(tailGeo, tailMat);
        tail.position.set(0, 0.3, -4.0);
        tail.rotation.x = 0.1;
        tail.castShadow = true;
        tail.receiveShadow = true;
        snakeGroup.add(tail);

        // Adiciona um brilho ao redor da cobra
        const glowGeo = new THREE.SphereGeometry(0.8, 16, 16);
        const glowMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88,
            emissive: 0x00ff88,
            emissiveIntensity: 0.3,
            transparent: true,
            opacity: 0.3
        });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.set(0, 0.3, 0.8);
        snakeGroup.add(glow);

        scene.add(snakeGroup);

        // Estrelas de fundo
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPositions[i*3] = (Math.random() - 0.5) * 200;
            starsPositions[i*3+1] = (Math.random() - 0.5) * 200;
            starsPositions[i*3+2] = (Math.random() - 0.5) * 200 - 100;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.2 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Dados do currículo com SÍMBOLOS
        const curriculumData = [
            // Skills (laranja)
            { 
                type: 'skill',
                color: 0xf89820,
                symbol: '⚡',
                position: [6, 1.5, -12],
                title: "JAVA",
                desc: "Especialista em Java",
                details: {
                    nivel: "Avançado",
                    experiencia: "5+ anos",
                    frameworks: ["Spring Boot", "Hibernate", "Maven", "JUnit"],
                    certificacoes: ["OCA Java SE 8", "Spring Professional"]
                }
            },
            { 
                type: 'skill',
                color: 0xf89820,
                symbol: '⚡',
                position: [-7, 1.5, -18],
                title: "SPRING BOOT",
                desc: "Framework principal",
                details: {
                    nivel: "Avançado",
                    experiencia: "4+ anos",
                    modulos: ["Spring Data", "Spring Security", "Spring Cloud", "Spring Batch"],
                    projetos: ["APIs REST", "Microsserviços", "Sistemas corporativos"]
                }
            },
            { 
                type: 'skill',
                color: 0xf89820,
                symbol: '⚡',
                position: [9, 1.5, -22],
                title: "JAVASCRIPT",
                desc: "Full Stack Development",
                details: {
                    nivel: "Avançado",
                    experiencia: "4+ anos",
                    stacks: ["React", "Node.js", "TypeScript", "Vue.js"],
                    projetos: ["SPAs", "APIs REST", "Aplicações em tempo real"]
                }
            },
            
            // Projetos (ciano)
            { 
                type: 'project',
                color: 0x00ffff,
                symbol: '📁',
                position: [12, 1.5, -15],
                title: "E-COMMERCE API",
                desc: "Plataforma de vendas completa",
                details: {
                    descricao: "API robusta para e-commerce com microservices",
                    tecnologias: ["Java 17", "Spring Boot", "PostgreSQL", "Redis", "Docker", "Kubernetes"],
                    features: ["Autenticação JWT", "Pagamentos", "Cache distribuído", "Filas com RabbitMQ"],
                    link: "github.com/seuuser/ecommerce"
                }
            },
            { 
                type: 'project',
                color: 0x00ffff,
                symbol: '📁',
                position: [-10, 1.5, -25],
                title: "TASK FLOW",
                desc: "Sistema de gestão de tarefas",
                details: {
                    descricao: "Aplicação completa para gestão de projetos",
                    tecnologias: ["React", "Node.js", "MongoDB", "Socket.io", "Tailwind"],
                    features: ["Tempo real", "Kanban", "Gráficos", "Notificações"],
                    link: "github.com/seuuser/taskflow"
                }
            },
            
            // Formação (rosa)
            { 
                type: 'education',
                color: 0xff44aa,
                symbol: '🎓',
                position: [-15, 1.5, -8],
                title: "BACHARELADO EM CC",
                desc: "Ciência da Computação",
                details: {
                    curso: "Ciência da Computação",
                    instituicao: "Universidade Federal (2018-2022)",
                    destaque: "CR 8.7 - Mérito acadêmico",
                    disciplinas: ["Estrutura de Dados", "Algoritmos", "BD", "Redes", "Compiladores"],
                    tcc: "Otimização de queries em bancos NoSQL"
                }
            },
            
            // Experiência (verde)
            { 
                type: 'experience',
                color: 0x2ecc71,
                symbol: '💼',
                position: [18, 1.5, -20],
                title: "SENIOR DEVELOPER",
                desc: "Tech Corp (2022-presente)",
                details: {
                    cargo: "Desenvolvedor Fullstack Sênior",
                    responsabilidades: [
                        "Liderança técnica de squad",
                        "Arquitetura de microsserviços",
                        "Code review e mentoria",
                        "Otimização de performance"
                    ],
                    stack: ["Java", "Spring", "React", "AWS", "Kafka"]
                }
            },
            { 
                type: 'experience',
                color: 0x2ecc71,
                symbol: '💼',
                position: [-18, 1.5, -30],
                title: "PLENO DEV",
                desc: "Startup X (2020-2022)",
                details: {
                    cargo: "Desenvolvedor Pleno",
                    responsabilidades: [
                        "Desenvolvimento de features core",
                        "Integração com APIs",
                        "Testes automatizados",
                        "Participação em hackathons"
                    ],
                    stack: ["Node.js", "React", "MongoDB", "Docker"]
                }
            },
            
            // Contato (vermelho)
            { 
                type: 'contact',
                color: 0xff0000,
                symbol: '📫',
                position: [0, 1.5, -45],
                title: "CONTATO",
                desc: "Vamos conversar!",
                details: {
                    email: "seu.email@exemplo.com",
                    linkedin: "linkedin.com/in/seuperfil",
                    github: "github.com/seuuser",
                    disponivel: "Disponível para novas oportunidades"
                }
            }
        ];

        // Criar marcadores com SÍMBOLOS
        const markers = [];
        
        curriculumData.forEach((data, index) => {
            const markerGroup = new THREE.Group();
            
            // Geometria baseada no tipo
            let geometry;
            switch(data.type) {
                case 'skill':
                    geometry = new THREE.BoxGeometry(2, 2.5, 2);
                    break;
                case 'project':
                    geometry = new THREE.CylinderGeometry(1.2, 1.2, 2.5, 8);
                    break;
                case 'education':
                    geometry = new THREE.ConeGeometry(1.4, 2.5, 8);
                    break;
                case 'experience':
                    geometry = new THREE.TorusGeometry(1.2, 0.3, 16, 32);
                    break;
                case 'contact':
                    geometry = new THREE.SphereGeometry(1.4, 16, 16);
                    break;
                default:
                    geometry = new THREE.BoxGeometry(2, 2, 2);
            }

            const material = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.color,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.9
            });

            const marker = new THREE.Mesh(geometry, material);
            marker.castShadow = true;
            marker.receiveShadow = true;
            markerGroup.add(marker);

            // Borda
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
            marker.add(line);

            // Símbolo flutuante
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 64, 64);
            ctx.font = 'bold 48px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(data.symbol, 32, 32);
            
            const texture = new THREE.CanvasTexture(canvas);
            const symbolMaterial = new THREE.SpriteMaterial({ 
                map: texture,
                transparent: true,
                depthTest: false,
                depthWrite: false
            });
            
            const symbolSprite = new THREE.Sprite(symbolMaterial);
            symbolSprite.scale.set(1.2, 1.2, 1);
            symbolSprite.position.set(0, 2.0, 0);
            markerGroup.add(symbolSprite);

            markerGroup.position.set(data.position[0], data.position[1], data.position[2]);
            
            markerGroup.userData = {
                ...data,
                discovered: false,
                id: index
            };

            scene.add(markerGroup);
            markers.push(markerGroup);

            // Luz pontual
            const light = new THREE.PointLight(data.color, 1, 10);
            light.position.set(data.position[0], 3, data.position[2]);
            scene.add(light);
        });

        // Cubos colecionáveis
        const collectibles = [];
        const collectiblePositions = [
            [3, 0.8, -5], [-4, 0.8, -10], [8, 0.8, -15], [-6, 0.8, -22],
            [12, 0.8, -18], [-10, 0.8, -25], [4, 0.8, -30], [-3, 0.8, -12]
        ];

        collectiblePositions.forEach((pos, i) => {
            const geometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const material = new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x0088aa,
                emissiveIntensity: 2
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(pos[0], pos[1], pos[2]);
            cube.castShadow = true;
            cube.receiveShadow = true;
            
            cube.userData = { 
                id: i, 
                collected: false,
                floatOffset: Math.random() * Math.PI * 2
            };
            
            scene.add(cube);
            collectibles.push(cube);
        });

        // Árvores decorativas
        const treePositions = [
            [15, -5], [-15, -10], [12, -30], [-12, -25],
            [20, -8], [-20, -15], [8, -40], [-8, -35]
        ];

        treePositions.forEach(pos => {
            // Tronco
            const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 2);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(pos[0], 1, pos[1]);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);

            // Folhas
            for (let i = 0; i < 5; i++) {
                const leafGeo = new THREE.SphereGeometry(0.7, 8);
                const leafMat = new THREE.MeshStandardMaterial({ 
                    color: 0x2ecc71,
                    emissive: 0x0a3300
                });
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.set(
                    pos[0] + (Math.random() - 0.5) * 1.2,
                    2 + Math.random() * 1,
                    pos[1] + (Math.random() - 0.5) * 1.2
                );
                leaf.castShadow = true;
                leaf.receiveShadow = true;
                scene.add(leaf);
            }
        });

        // Controles
        const keys = { w: false, a: false, s: false, d: false, shift: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = true;
                e.preventDefault();
            }
            if (key === 'shift') {
                keys.shift = true;
            }
            if (key === 'escape') {
                closeInfoCard();
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = false;
            }
            if (key === 'shift') {
                keys.shift = false;
            }
        });

        // Estado da UI
        let cardOpen = false;
        let achievementsCount = 0;
        let cubesCollected = 0;
        let currentTarget = null;
        let toastTimeout = null;

        // Funções UI
        window.showInfo = (data) => {
            document.getElementById('card-title').innerHTML = `${data.symbol} ${data.title}`;
            
            let content = `<p>${data.desc}</p>`;
            
            if (data.type === 'skill') {
                content += `<h3>📊 Nível: ${data.details.nivel}</h3>`;
                content += `<p><strong>Experiência:</strong> ${data.details.experiencia}</p>`;
                if (data.details.frameworks) {
                    content += `<h3>🔧 Frameworks:</h3><ul>${data.details.frameworks.map(f => `<li>${f}</li>`).join('')}</ul>`;
                }
                if (data.details.certificacoes) {
                    content += `<h3>📜 Certificações:</h3><ul>${data.details.certificacoes.map(c => `<li>${c}</li>`).join('')}</ul>`;
                }
            } else if (data.type === 'project') {
                content += `<h3>📋 Descrição:</h3><p>${data.details.descricao}</p>`;
                content += `<h3>🛠️ Tecnologias:</h3><div>${data.details.tecnologias.map(t => `<span class="skill-tag">${t}</span>`).join('')}</div>`;
                content += `<h3>✨ Features:</h3><ul>${data.details.features.map(f => `<li>${f}</li>`).join('')}</ul>`;
                if (data.details.link) content += `<p><strong>🔗 Link:</strong> ${data.details.link}</p>`;
            } else if (data.type === 'education') {
                content += `<h3>🎓 ${data.details.curso}</h3>`;
                content += `<p><strong>Instituição:</strong> ${data.details.instituicao}</p>`;
                content += `<p><strong>Destaque:</strong> ${data.details.destaque}</p>`;
                content += `<h3>📚 Disciplinas:</h3><ul>${data.details.disciplinas.map(d => `<li>${d}</li>`).join('')}</ul>`;
                content += `<p><strong>TCC:</strong> ${data.details.tcc}</p>`;
            } else if (data.type === 'experience') {
                content += `<h3>💼 ${data.details.cargo}</h3>`;
                content += `<h3>📋 Responsabilidades:</h3><ul>${data.details.responsabilidades.map(r => `<li>${r}</li>`).join('')}</ul>`;
                content += `<h3>🛠️ Stack:</h3><div>${data.details.stack.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>`;
            } else if (data.type === 'contact') {
                content += `<h3>📧 Email:</h3><p>${data.details.email}</p>`;
                content += `<h3>🔗 LinkedIn:</h3><p>${data.details.linkedin}</p>`;
                content += `<h3>🐙 GitHub:</h3><p>${data.details.github}</p>`;
                content += `<h3>✅ ${data.details.disponivel}</h3>`;
            }
            
            document.getElementById('card-content').innerHTML = content;
            document.getElementById('info-card').style.display = 'block';
            cardOpen = true;
            
            if (!data.discovered) {
                data.discovered = true;
                achievementsCount++;
                document.getElementById('achievements-count').textContent = achievementsCount;
                
                // AUMENTA O TAMANHO DA COBRA
                updateSnakeSize();
                
                showToast(`✨ Nova conquista: ${data.title}! 🐍 Cobra cresceu!`);
                
                if (achievementsCount === markers.length) {
                    showToast("🎉 PARABÉNS! Você descobriu tudo sobre mim! Cobra no tamanho máximo!");
                }
            }
        };

        window.closeInfoCard = () => {
            document.getElementById('info-card').style.display = 'none';
            cardOpen = false;
            if (currentTarget) {
                const direction = snakeGroup.position.clone().sub(currentTarget.position).normalize();
                snakeGroup.position.add(direction.multiplyScalar(1.5));
                currentTarget = null;
            }
        };

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.opacity = '1';
            
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        // Variáveis para animação da cobra
        let snakeAngle = 0;
        const bodyPositions = [];

        // Loop de animação
        function animate() {
            requestAnimationFrame(animate);

            // Movimento da cobra
            if (!cardOpen) {
                const speed = keys.shift ? 0.2 : 0.1;
                const oldPos = snakeGroup.position.clone();
                
                if (keys.w) snakeGroup.position.z -= speed;
                if (keys.s) snakeGroup.position.z += speed;
                if (keys.a) snakeGroup.position.x -= speed;
                if (keys.d) snakeGroup.position.x += speed;

                // Limites do mapa
                snakeGroup.position.x = Math.max(-25, Math.min(25, snakeGroup.position.x));
                snakeGroup.position.z = Math.max(-48, Math.min(10, snakeGroup.position.z));

                // Rotacionar a cobra na direção do movimento
                if (keys.w || keys.s || keys.a || keys.d) {
                    const direction = new THREE.Vector3(
                        snakeGroup.position.x - oldPos.x,
                        0,
                        snakeGroup.position.z - oldPos.z
                    );
                    if (direction.length() > 0) {
                        direction.normalize();
                        const angle = Math.atan2(direction.x, direction.z);
                        snakeGroup.rotation.y = angle;
                    }
                }

                // Animar o corpo da cobra (ondulação suave)
                snakeAngle += 0.1;
                bodyPositions.unshift(snakeGroup.position.clone());
                if (bodyPositions.length > 8) bodyPositions.pop();
                
                // Animar os segmentos do corpo com movimento suave
                bodySegments.forEach((segment, index) => {
                    if (bodyPositions[index + 1]) {
                        // Mantém a altura constante (não afunda)
                        segment.position.y = 0.3;
                        // Pequena ondulação lateral
                        segment.position.x = Math.sin(snakeAngle + index) * 0.1;
                    }
                });
                
                // Animar a língua
                tongue.rotation.z = Math.sin(snakeAngle * 2) * 0.1;
            }

            // Atualizar câmera
            const targetCamPos = new THREE.Vector3(
                snakeGroup.position.x,
                snakeGroup.position.y + 6,
                snakeGroup.position.z + 10
            );
            camera.position.lerp(targetCamPos, 0.05);
            camera.lookAt(snakeGroup.position);

            // Detecção de proximidade
            if (!cardOpen) {
                let closestDist = Infinity;
                let closestMarker = null;

                markers.forEach(marker => {
                    const dist = snakeGroup.position.distanceTo(marker.position);
                    const detectionRange = 4.0;
                    if (dist < detectionRange && dist < closestDist) {
                        closestDist = dist;
                        closestMarker = marker;
                    }
                });

                if (closestMarker && !cardOpen) {
                    currentTarget = closestMarker;
                    showInfo(closestMarker.userData);
                }
            }

            // Coleta de cubos
            collectibles.forEach(cube => {
                if (!cube.userData.collected) {
                    const dist = snakeGroup.position.distanceTo(cube.position);
                    if (dist < 2.5) {
                        cube.userData.collected = true;
                        scene.remove(cube);
                        cubesCollected++;
                        document.getElementById('cubes-collected').textContent = cubesCollected;
                        showToast(`💾 Código coletado! (${cubesCollected}/8)`);
                        
                        if (cubesCollected === collectibles.length) {
                            achievementsCount++;
                            document.getElementById('achievements-count').textContent = achievementsCount;
                            updateSnakeSize();
                            showToast("🌟 VOCÊ COLETOU TODOS OS CÓDIGOS! Cobra cresceu!");
                        }
                    }
                }
            });

            // Animações dos marcadores
            markers.forEach((marker, i) => {
                marker.rotation.y += 0.005;
                marker.position.y = 1.5 + Math.sin(Date.now() * 0.002 + i) * 0.2;
            });

            // Animações dos cubos
            collectibles.forEach((cube, i) => {
                cube.rotation.x += 0.02;
                cube.rotation.y += 0.03;
                cube.position.y = 0.8 + Math.sin(Date.now() * 0.003 + cube.userData.floatOffset) * 0.2;
            });

            // Rotação das estrelas
            stars.rotation.y += 0.0002;

            renderer.render(scene, camera);
        }

        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Prevenir menu de contexto
        window.addEventListener('contextmenu', e => e.preventDefault());

        // Mobile controls
        const joystick = document.getElementById('mobile-joystick');
        let touchActive = false;
        let touchStart = { x: 0, y: 0 };

        joystick.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchActive = true;
            const touch = e.touches[0];
            touchStart.x = touch.clientX;
            touchStart.y = touch.clientY;
        });

        joystick.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!touchActive) return;
            
            const touch = e.touches[0];
            const deltaX = touch.clientX - touchStart.x;
            const deltaY = touch.clientY - touchStart.y;
            
            keys.w = deltaY < -20;
            keys.s = deltaY > 20;
            keys.a = deltaX < -20;
            keys.d = deltaX > 20;
        });

        joystick.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchActive = false;
            keys.w = keys.a = keys.s = keys.d = false;
        });
    </script>
</body>
</html>
