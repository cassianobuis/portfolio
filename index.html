        #ui {

            left: 0;

            padding: 15px 30px 15px 25px;

        .header h1 {
            margin: 0;

            letter-spacing: 3px;

        .header p {

            font-size: 1.2rem;

        }

            width: 90%;
            pointer-events: all;

            color: #eee;
            text-align: center;
            animation: cardGlow 2s infinite alternate;
            z-index: 30;
            max-height: 80vh;
            overflow-y: auto;

        @keyframes cardGlow {
            0% { box-shadow: 0 0 40px rgba(248,152,32,0.5); }

        #info-card h2 {

            text-transform: uppercase;

        #info-card p {
            font-size: 1.2rem;

            margin-bottom: 15px;
        }

        #info-card ul {
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ddd;
        }

        #info-card li {
            margin-bottom: 8px;
        }

        .skill-tag {
            display: inline-block;

            padding: 5px 15px;
            border-radius: 30px;

        }

        .btn-close {
            background: transparent;
            border: 2px solid #f89820;
            color: #f89820;
            padding: 12px 30px;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(248,152,32,0.3);
            margin-top: 20px;
        }
        
        .btn-close:hover {
            background: #f89820;
            color: #111;
            transform: scale(1.07);
            box-shadow: 0 0 40px #f89820;
        }

        .active { display: block !important; }

        #objective-counter {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #f89820;
            font-size: 1.3rem;
            font-weight: bold;
            color: #f89820;
            box-shadow: 0 0 30px rgba(248,152,32,0.3);
            pointer-events: none;
        }

        #collectible-counter {
            position: absolute;
            bottom: 100px;
            right: 40px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #00ffff;
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ffff;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
            pointer-events: none;
        }

        #message-toast {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(248,152,32,0.9);
            color: #111;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 0 30px #f89820;
            z-index: 25;
        }

        .mini-map {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 200px;
            height: 200px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #f89820;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 15px;
            color: #fff;
            font-size: 0.8rem;
        }

        .mini-map h4 {
            margin: 0 0 10px;
            color: #f89820;
            text-align: center;
        }

        .mini-map .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>

    <script type="importmap">
        {
            "imports": {

    <script type="module">
        import * as THREE from 'three';

        // --- CENA E RENDER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);
        scene.fog = new THREE.Fog(0x0a0a14, 15, 70);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 18);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- LUZES ---
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);

        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        mainLight.position.set(5, 20, 10);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        const d = 30;
        mainLight.shadow.camera.left = -d;
        mainLight.shadow.camera.right = d;
        mainLight.shadow.camera.top = d;
        mainLight.shadow.camera.bottom = -d;
        mainLight.shadow.camera.near = 1;
        mainLight.shadow.camera.far = 60;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x4466ff, 0.8);
        fillLight.position.set(-5, 5, 10);
        scene.add(fillLight);

        // --- CHÃO ---
        const groundGeo = new THREE.CircleGeometry(50, 32);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e, 
            roughness: 0.4, 
            metalness: 0.1,
            emissive: 0x050510
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(80, 50, 0xf89820, 0x335588);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- JOGADOR ---
        const playerGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const playerMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            emissive: 0x00aaff,
            emissiveIntensity: 1.8
        });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 0.7;
        player.castShadow = true;
        player.receiveShadow = true;
        scene.add(player);

        // Partículas ao redor do jogador
        const particleCount = 8;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            particlePositions[i*3] = Math.cos(angle) * 1.2;
            particlePositions[i*3+1] = 0.2;
            particlePositions[i*3+2] = Math.sin(angle) * 1.2;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88ccff, size: 0.1, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        player.add(particles);

        // --- SISTEMA DE CONQUISTAS ---
        let achievementsCount = 0;
        let cubesCollected = 0;
        const discoveredItems = new Set();

        function updateAchievements() {
            document.getElementById('achievements-count').innerText = achievementsCount;
            if (achievementsCount === 10) {
                showMessage("🎉 PARABÉNS! VOCÊ DESCOBRIU TUDO SOBRE MIM!");
            }
        }

        // --- CARREGADOR DE TEXTURAS ---
        const loader = new THREE.TextureLoader();
        
        // ===== DADOS DO CURRÍCULO =====
        const curriculumData = [
            // Skills Técnicas (Laranja)
            { 
                type: 'skill',
                x: 6, z: -12, 
                title: "JAVA", 
                desc: "☕ Especialista em Java",
                fullData: {
                    nivel: "Avançado",
                    experiencia: "5+ anos",
                    frameworks: ["Spring Boot", "Jakarta EE", "Hibernate"],
                    certificacoes: ["OCA Java SE 8", "Spring Professional"],
                    projetos: ["APIs escaláveis", "Microsserviços", "Batch processing"]
                }
            },
            { 
                type: 'skill',
                x: -7, z: -18, 
                title: "CSS3", 
                desc: "🎨 Estilização avançada",
                fullData: {
                    nivel: "Avançado",
                    experiencia: "4+ anos",
                    frameworks: ["Tailwind", "Bootstrap", "SASS"],
                    tecnicas: ["Flexbox", "Grid", "Animações", "Responsividade"],
                    projetos: ["Design systems", "Landing pages", "Dashboards"]
                }
            },
            { 
                type: 'skill',
                x: 9, z: -22, 
                title: "HTML5", 
                desc: "🏗️ Estrutura semântica",
                fullData: {
                    nivel: "Avançado",
                    experiencia: "5+ anos",
                    tecnicas: ["Semântica", "Acessibilidade (WCAG)", "SEO", "Microdata"],
                    projetos: ["E-commerces", "Portais", "Sites institucionais"]
                }
            },
            { 
                type: 'skill',
                x: -5, z: -8, 
                title: "NODE.JS", 
                desc: "⚡ Backend escalável",
                fullData: {
                    nivel: "Avançado",
                    experiencia: "4+ anos",
                    frameworks: ["Express", "NestJS", "Fastify"],
                    bancos: ["MongoDB", "PostgreSQL", "Redis"],
                    projetos: ["APIs REST", "Websockets", "Microservices"]
                }
            },
            {

                desc: "🍃 Ecossistema Spring",
                fullData: {
                    nivel: "Avançado",
                    experiencia: "4+ anos",
                    modulos: ["Spring Data", "Spring Security", "Spring Cloud", "Spring Batch"],
                    projetos: ["Microsserviços", "APIs RESTful", "Sistemas corporativos"]
                }
            },
            
            // Projetos (Ciano)
            { 
                type: 'project',
                x: 12, z: -15, 
                title: "E-COMMERCE API", 
                desc: "🛒 Plataforma completa",
                fullData: {

            {

                fullData: {

            },
            
            // Formação (Rosa)
            { 
                type: 'education',
                x: -15, z: -8, 
                title: "BACHARELADO EM CC", 
                desc: "🎓 Universidade Federal",
                fullData: {
                    curso: "Ciência da Computação",

                    destaque: "CR 8.5 - Mérito acadêmico",
                    disciplinas: ["Estrutura de Dados", "Algoritmos", "Banco de Dados", "Redes", "Compiladores"],
                    tcc: "Otimização de consultas em bancos NoSQL"
                }
            },
            
            // Experiência (Verde)
            { 
                type: 'experience',
                x: 18, z: -20, 
                title: "SENIOR DEV - TECH CORP", 
                desc: "💼 Última experiência",
                fullData: {
                    cargo: "Desenvolvedor Fullstack Sênior",
                    periodo: "2022 - Presente",
                    responsabilidades: [
                        "Liderança técnica de squad com 5 devs",
                        "Arquitetura de microsserviços com Spring Cloud",
                        "Code review e mentoria",
                        "Otimização de performance (redução de 40% no tempo de resposta)"
                    ],
                    stack: ["Java", "Spring", "React", "AWS", "Kafka"]
                }
            },
            { 
                type: 'experience',
                x: -18, z: -30, 
                title: "PLENO DEV - STARTUP X", 
                desc: "🚀 Crescimento acelerado",
                fullData: {
                    cargo: "Desenvolvedor Pleno",
                    periodo: "2020 - 2022",
                    responsabilidades: [
                        "Desenvolvimento de funcionalidades core",
                        "Integração com APIs de terceiros",
                        "Testes automatizados e CI/CD",
                        "Participação em hackathons (1º lugar)"
                    ],
                    stack: ["Node.js", "React", "MongoDB", "Docker"]
                }
            },
            
            // Contato (Vermelho)
            { 
                type: 'contact',
                x: 0, z: -40, 
                title: "CONTATO", 
                desc: "📫 Fale comigo",
                fullData: {
                    email: "seu.email@exemplo.com",
                    linkedin: "linkedin.com/in/seuperfil",
                    github: "github.com/seuuser",
                    whatsapp: "+55 11 99999-9999",
                    disponivel: "Disponível para novas oportunidades"
                }
            }
        ];

        const markerMeshes = [];

        // Função para criar material com textura
        function createLogoMaterial(logoUrl, fallbackColor) {
            return new Promise((resolve) => {
                loader.load(logoUrl, 
                    (texture) => {
                        const material = new THREE.MeshStandardMaterial({ 
                            map: texture,
                            emissive: 0x222222,
                            side: THREE.DoubleSide,
                            transparent: true
                        });
                        resolve(material);
                    },
                    undefined,
                    (error) => {
                        console.warn(`Erro ao carregar ${logoUrl}, usando fallback colorido.`);
                        const material = new THREE.MeshStandardMaterial({ 
                            color: fallbackColor,
                            emissive: 0x222222,
                            side: THREE.DoubleSide
                        });
                        resolve(material);
                    }
                );
            });
        }

        // Cores por tipo
        const typeColors = {
            skill: 0xf89820,
            project: 0x00ffff,
            education: 0xff44aa,
            experience: 0x2ecc71,
            contact: 0xff0000
        };

        // Criar todos os marcadores do currículo
        curriculumData.forEach((data) => {
            const color = typeColors[data.type] || 0xffffff;
            
            // Geometria diferente por tipo
            let geom;
            if (data.type === 'skill') geom = new THREE.BoxGeometry(2.5, 2.8, 0.8);
            else if (data.type === 'project') geom = new THREE.CylinderGeometry(1.2, 1.2, 3, 8);
            else if (data.type === 'education') geom = new THREE.ConeGeometry(1.5, 3, 8);
            else if (data.type === 'experience') geom = new THREE.TorusGeometry(1.2, 0.3, 16, 32);
            else geom = new THREE.SphereGeometry(1.5, 16);
            
            const material = new THREE.MeshStandardMaterial({ 
                color: color,
                emissive: color,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.9
            });
            
            const mesh = new THREE.Mesh(geom, material);
            mesh.position.set(data.x, 1.8, data.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // Adiciona borda
            const edges = new THREE.EdgesGeometry(geom);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
            mesh.add(line);
            
            mesh.userData = {
                ...data,
                discovered: false,
                getFullContent: () => {
                    const d = data.fullData;
                    let html = `<p>${data.desc}</p>`;
                    
                    if (data.type === 'skill') {
                        html += `<h3>📊 Nível: ${d.nivel}</h3>`;
                        html += `<p><strong>Experiência:</strong> ${d.experiencia}</p>`;
                        html += `<h3>🔧 Frameworks:</h3><ul>${d.frameworks.map(f => `<li>${f}</li>`).join('')}</ul>`;
                        html += `<h3>📜 Certificações:</h3><ul>${d.certificacoes.map(c => `<li>${c}</li>`).join('')}</ul>`;
                    } else if (data.type === 'project') {
                        html += `<h3>📋 Descrição:</h3><p>${d.descricao}</p>`;
                        html += `<h3>🛠️ Tecnologias:</h3><div>${d.tecnologias.map(t => `<span class="skill-tag">${t}</span>`).join('')}</div>`;
                        html += `<h3>✨ Features:</h3><ul>${d.features.map(f => `<li>${f}</li>`).join('')}</ul>`;
                        if (d.link) html += `<p><strong>🔗 Link:</strong> ${d.link}</p>`;
                    } else if (data.type === 'education') {
                        html += `<h3>🎓 ${d.curso}</h3>`;
                        html += `<p><strong>Instituição:</strong> ${d.instituicao}</p>`;
                        html += `<p><strong>Destaque:</strong> ${d.destaque}</p>`;
                        html += `<h3>📚 Disciplinas:</h3><ul>${d.disciplinas.map(disc => `<li>${disc}</li>`).join('')}</ul>`;
                        html += `<p><strong>TCC:</strong> ${d.tcc}</p>`;
                    } else if (data.type === 'experience') {
                        html += `<h3>💼 ${d.cargo}</h3>`;
                        html += `<p><strong>Período:</strong> ${d.periodo}</p>`;
                        html += `<h3>📋 Responsabilidades:</h3><ul>${d.responsabilidades.map(r => `<li>${r}</li>`).join('')}</ul>`;
                        html += `<h3>🛠️ Stack:</h3><div>${d.stack.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>`;
                    } else if (data.type === 'contact') {
                        html += `<h3>📧 Email:</h3><p>${d.email}</p>`;
                        html += `<h3>🔗 LinkedIn:</h3><p>${d.linkedin}</p>`;
                        html += `<h3>🐙 GitHub:</h3><p>${d.github}</p>`;
                        html += `<h3>📱 WhatsApp:</h3><p>${d.whatsapp}</p>`;
                        html += `<h3>✅ ${d.disponivel}</h3>`;
                    }
                    
                    return html;
                }
            };
            
            scene.add(mesh);
            markerMeshes.push(mesh);

            // Luz pontual
            const pointLight = new THREE.PointLight(color, 1.2, 12);
            pointLight.position.set(data.x, 3, data.z);
            scene.add(pointLight);
        });

        // --- CUBOS COLECIONÁVEIS ---
        const collectibles = [];
        const collectiblePositions = [
            { x: 3, z: -5 }, { x: -4, z: -10 }, { x: 8, z: -15 }, { x: -6, z: -22 },
            { x: 12, z: -18 }, { x: -10, z: -25 }, { x: 4, z: -30 }, { x: -3, z: -12 }
        ];

        collectiblePositions.forEach((pos, i) => {
            const geom = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00ffff,
                emissive: 0x0088aa,
                emissiveIntensity: 2
            });
            const cube = new THREE.Mesh(geom, mat);
            cube.position.set(pos.x, 0.5, pos.z);
            cube.castShadow = true;
            cube.receiveShadow = true;
            
            cube.userData = { id: i, collected: false, floatOffset: Math.random() * 100 };
            scene.add(cube);
            collectibles.push(cube);
        });

        // --- ÁRVORES E DECORAÇÃO ---
        const treePositions = [
            { x: 15, z: -5 }, { x: -15, z: -10 }, { x: 12, z: -30 }, { x: -12, z: -25 }
        ];

        treePositions.forEach(pos => {
            // Tronco
            const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 2);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(pos.x, 1, pos.z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);

            // Copa
            for (let i = 0; i < 5; i++) {
                const leafGeo = new THREE.SphereGeometry(0.8, 8);
                const leafMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71, emissive: 0x0a3300 });
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.set(
                    pos.x + (Math.random() - 0.5) * 1.5,
                    2.2 + Math.random() * 1.2,
                    pos.z + (Math.random() - 0.5) * 1.5
                );
                leaf.castShadow = true;
                leaf.receiveShadow = true;
                scene.add(leaf);
            }
        });

        // --- PORTAL (acesso rápido ao contato) ---
        const portalBaseGeo = new THREE.CylinderGeometry(2, 2, 0.5, 32);
        const portalBaseMat = new THREE.MeshStandardMaterial({ color: 0x333333, emissive: 0x440022 });
        const portalBase = new THREE.Mesh(portalBaseGeo, portalBaseMat);
        portalBase.position.set(0, 0.25, -45);
        portalBase.receiveShadow = true;
        scene.add(portalBase);

        const portalRingGeo = new THREE.TorusGeometry(1.5, 0.2, 16, 64);
        const portalRingMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 });
        const portalRing = new THREE.Mesh(portalRingGeo, portalRingMat);
        portalRing.rotation.x = Math.PI / 2;
        portalRing.position.set(0, 1.2, -45);
        portalRing.castShadow = true;
        scene.add(portalRing);

        // --- ESTRELAS ---
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 400;
        const starsPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPos[i*3] = (Math.random() - 0.5) * 200;
            starsPos[i*3+1] = (Math.random() - 0.5) * 100;
            starsPos[i*3+2] = (Math.random() - 0.5) * 200 - 100;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.3, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- MOVIMENTO E INTERAÇÃO ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { const k = e.key.toLowerCase(); if (['w','a','s','d'].includes(k)) keys[k] = true; });
        window.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if (['w','a','s','d'].includes(k)) keys[k] = false; });

        const infoCard = document.getElementById('info-card');
        let cardOpen = false;
        let currentTarget = null;
        let messageTimeout = null;

        function showMessage(msg) {
            const toast = document.getElementById('message-toast');
            toast.style.opacity = 1;
            toast.innerHTML = msg;
            
            if (messageTimeout) clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                toast.style.opacity = 0;
            }, 2000);
        }

        window.showInfo = (data) => {
            document.getElementById('title').innerHTML = `${data.type === 'skill' ? '🔧' : data.type === 'project' ? '📁' : data.type === 'education' ? '🎓' : data.type === 'experience' ? '💼' : '📫'} ${data.title}`;
            document.getElementById('content-area').innerHTML = data.getFullContent();
            infoCard.classList.add('active');
            cardOpen = true;
            
            if (!data.discovered) {
                data.discovered = true;
                achievementsCount++;
                updateAchievements();
                showMessage(`✨ Novo item descoberto: ${data.title}`);
            }
        };

        window.closeInfo = () => {
            infoCard.classList.remove('active');
            cardOpen = false;
            if (currentTarget) {
                const dir = player.position.clone().sub(currentTarget.position).normalize();
                player.position.add(dir.multiplyScalar(2.5));
                currentTarget = null;
            }
        };

        // Loop de animação
        function animate() {
            requestAnimationFrame(animate);

            if (!cardOpen) {
                const speed = 0.18;
                if (keys.w) player.position.z -= speed;
                if (keys.s) player.position.z += speed;
                if (keys.a) player.position.x -= speed;
                if (keys.d) player.position.x += speed;

                player.position.x = Math.max(-25, Math.min(25, player.position.x));
                player.position.z = Math.max(-48, Math.min(10, player.position.z));
            }

            const targetCamPos = new THREE.Vector3(
                player.position.x,
                player.position.y + 7.5,
                player.position.z + 13
            );
            camera.position.lerp(targetCamPos, 0.08);
            camera.lookAt(player.position);

            // Detecção de proximidade para marcadores
            let closestDist = 8;
            let closestMesh = null;
            markerMeshes.forEach(m => {
                const dist = player.position.distanceTo(m.position);
                if (dist < 4.0 && dist < closestDist && !cardOpen) {
                    closestDist = dist;
                    closestMesh = m;
                }
            });

            if (closestMesh && !cardOpen) {
                currentTarget = closestMesh;
                showInfo(closestMesh.userData);
            }

            // Detecção de coleta dos cubos
            collectibles.forEach(cube => {
                if (!cube.userData.collected) {
                    const dist = player.position.distanceTo(cube.position);
                    if (dist < 2) {
                        cube.userData.collected = true;
                        scene.remove(cube);
                        cubesCollected++;
                        document.getElementById('cubes-collected').innerText = cubesCollected;
                        showMessage(`💾 Código coletado! (${cubesCollected}/8)`);
                        
                        if (cubesCollected === collectibles.length) {
                            achievementsCount++;
                            updateAchievements();
                            showMessage("🌟 VOCÊ COLETOU TODOS OS CÓDIGOS!");
                        }
                    }
                }
            });

            // Animações
            markerMeshes.forEach((m, i) => {
                m.rotation.y += 0.005;
                m.position.y = 1.8 + Math.sin(Date.now() * 0.002 + i) * 0.3;
            });

            collectibles.forEach((cube, i) => {
                cube.rotation.x += 0.02;
                cube.rotation.y += 0.03;
                cube.position.y = 0.5 + Math.sin(Date.now() * 0.003 + i) * 0.2;
            });

            portalRing.rotation.y += 0.01;
            portalRing.rotation.z += 0.005;

            stars.rotation.y += 0.0001;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
