<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Portfolio | 3D Experience</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #050505; }
        canvas { display: block; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white; display: flex;
            flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box; z-index: 10;
        }

        .header h1 { 
            margin: 0; font-size: 2.5rem; letter-spacing: 8px;
            color: #f89820; text-shadow: 0 0 20px rgba(248, 152, 32, 0.8);
        }

        #info-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); border: 1px solid #f89820;
            padding: 30px; border-radius: 15px; text-align: center;
            max-width: 350px; pointer-events: all; display: none;
            backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .active { display: block !important; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        button {
            background: transparent; border: 1px solid #f89820; padding: 10px 20px;
            color: #f89820; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #f89820; color: white; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="header">
            <h1>JAVA ARCHITECT</h1>
            <p style="color: #888;">&lt; code / design / deploy &gt;</p>
        </div>

        <div id="info-card">
            <h2 id="title"></h2>
            <p id="desc"></p>
            <button onclick="closeInfo()">CONTINUAR EXPLORANDO</button>
        </div>

        <div class="controls-hint" style="opacity: 0.6; font-size: 0.8rem;">
            WASD PARA MOVER • APROXIME-SE DOS PILARES
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 45); // Neblina para profundidade
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- AMBIENTE (PARTÍCULAS) ---
        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i=0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 0.05, color: 0xaaaaaa });
        const particlesMesh = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particlesMesh);

        // --- CHÃO ---
        const grid = new THREE.GridHelper(200, 100, 0x444444, 0x111111);
        scene.add(grid);

        // --- JOGADOR ---
        const playerGroup = new THREE.Group();
        const playerGeo = new THREE.IcosahedronGeometry(0.6, 2);
        const playerMat = new THREE.MeshStandardMaterial({ 
            color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 2, wireframe: true 
        });
        const player = new THREE.Mesh(playerGeo, playerMat);
        playerGroup.add(player);
        
        const playerLight = new THREE.PointLight(0x00f2ff, 15, 10);
        playerGroup.add(playerLight);
        
        playerGroup.position.y = 0.8;
        scene.add(playerGroup);

        // --- DATA ---
        const markers = [
            { x: 8, z: -12, title: "Spring Boot", desc: "Expertise em APIs RESTful e Microserviços.", color: 0x6db33f },
            { x: -10, z: -18, title: "AWS Cloud", desc: "Deploy e escalabilidade usando EC2 e S3.", color: 0xff9900 },
            { x: 0, z: -25, title: "PostgreSQL", desc: "Modelagem de dados e performance queries.", color: 0x336791 }
        ];

        const markerMeshes = [];
        markers.forEach(data => {
            const mesh = new THREE.Mesh(
                new THREE.OctahedronGeometry(1, 0),
                new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.5 })
            );
            mesh.position.set(data.x, 2, data.z);
            mesh.userData = data;
            scene.add(mesh);
            markerMeshes.push(mesh);

            const light = new THREE.PointLight(data.color, 10, 8);
            light.position.set(data.x, 2, data.z);
            scene.add(light);
        });

        // --- CONTROLES ---
        const keys = {};
        let cardOpen = false;
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function update() {
            if (cardOpen) return;

            const speed = 0.12;
            if (keys['w']) playerGroup.position.z -= speed;
            if (keys['s']) playerGroup.position.z += speed;
            if (keys['a']) playerGroup.position.x -= speed;
            if (keys['d']) playerGroup.position.x += speed;

            // Camera follow (Suave)
            const targetCamPos = new THREE.Vector3(playerGroup.position.x, 6, playerGroup.position.z + 10);
            camera.position.lerp(targetCamPos, 0.05);
            camera.lookAt(playerGroup.position);

            // Colisão/Interação
            markerMeshes.forEach(m => {
                if (playerGroup.position.distanceTo(m.position) < 2) {
                    showInfo(m.userData);
                }
            });
        }

        function showInfo(data) {
            document.getElementById('title').innerText = data.title;
            document.getElementById('desc').innerText = data.desc;
            document.getElementById('info-card').classList.add('active');
            cardOpen = true;
        }

        window.closeInfo = () => {
            document.getElementById('info-card').classList.remove('active');
            playerGroup.position.z += 3;
            cardOpen = false;
        };

        function animate() {
            requestAnimationFrame(animate);
            update();
            
            // Animações Visuais
            player.rotation.y += 0.01;
            player.rotation.z += 0.01;
            
            markerMeshes.forEach((m, i) => {
                m.rotation.y -= 0.02;
                m.position.y = 2 + Math.sin(Date.now() * 0.002 + i) * 0.5;
            });

            renderer.render(scene, camera);
        }

        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
