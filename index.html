<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Island</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#020810; font-family:'Courier New',monospace; cursor:none; }

  #custom-cursor {
    position:fixed; width:12px; height:12px; border-radius:50%;
    background:#fff; pointer-events:none; z-index:9999;
    transform:translate(-50%,-50%); mix-blend-mode:difference;
    transition:transform 0.1s;
  }

  #loading {
    position:fixed; inset:0; background:#020810;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:200; transition:opacity 1s ease;
  }
  #loading h1 {
    font-size:32px; color:#e8f4f8; letter-spacing:0.4em; text-transform:uppercase;
    margin-bottom:6px; text-shadow:0 0 30px rgba(150,220,255,0.8);
  }
  #loading .subtitle { color:rgba(150,200,255,0.5); font-size:12px; letter-spacing:0.3em; margin-bottom:50px; }
  #load-bar-bg { width:280px; height:2px; background:rgba(255,255,255,0.1); border-radius:2px; }
  #load-bar { height:100%; background:linear-gradient(90deg,#4af,#8ff); border-radius:2px; width:0%; transition:width 0.2s; }
  #load-tip { margin-top:16px; color:rgba(255,255,255,0.25); font-size:11px; letter-spacing:0.15em; }

  #hud { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:10; }
  #hud-title {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:12px;
    background:rgba(2,8,20,0.75); backdrop-filter:blur(12px);
    border:1px solid rgba(100,200,255,0.2); border-radius:50px;
    padding:10px 26px; white-space:nowrap;
  }
  #hud-title .dot { width:7px; height:7px; border-radius:50%; background:#4fa;
    box-shadow:0 0 8px #4fa; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  #hud-title span { color:#8de; font-size:12px; letter-spacing:0.2em; text-transform:uppercase; }
  #hud-area { color:rgba(255,255,255,0.5)!important; }

  #controls {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center;
    background:rgba(2,8,20,0.7); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08); border-radius:30px;
    padding:9px 20px; color:rgba(255,255,255,0.45); font-size:11px; letter-spacing:0.1em;
  }
  .kbd {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:22px; height:22px; padding:0 5px;
    border-radius:4px; background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2); color:#ccc; font-size:10px; font-weight:bold;
  }
  .sep { opacity:.3; margin:0 4px; }

  #proximity {
    position:absolute; bottom:76px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px;
    background:rgba(2,8,20,0.85); backdrop-filter:blur(10px);
    border:1px solid rgba(80,200,255,0.4); border-radius:12px;
    padding:10px 20px; color:#7df; font-size:12px; letter-spacing:0.1em;
    opacity:0; transition:opacity 0.3s; pointer-events:none;
  }
  #proximity.show { opacity:1; }

  #minimap-wrap {
    position:absolute; bottom:24px; right:24px;
    border-radius:50%; overflow:hidden;
    border:2px solid rgba(80,200,255,0.25);
    box-shadow:0 0 20px rgba(0,100,200,0.3);
  }

  /* FPS Counter */
  #fps-counter {
    position:absolute; top:20px; right:24px;
    background:rgba(2,8,20,0.75); backdrop-filter:blur(12px);
    border:1px solid rgba(100,200,255,0.15); border-radius:8px;
    padding:6px 12px; color:#4af; font-size:11px; letter-spacing:0.1em;
  }

  #modal {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.9);
    width:440px; max-width:94vw;
    background:linear-gradient(160deg, rgba(5,15,35,0.97), rgba(2,8,25,0.97));
    backdrop-filter:blur(24px);
    border:1px solid rgba(80,180,255,0.15); border-radius:22px;
    padding:38px; pointer-events:all;
    opacity:0; transition:all 0.4s cubic-bezier(.34,1.56,.64,1);
    display:none; box-shadow:0 30px 80px rgba(0,0,0,0.8), 0 0 40px rgba(30,100,200,0.15);
  }
  #modal.show { opacity:1; transform:translate(-50%,-50%) scale(1); display:block; }
  .m-icon { font-size:56px; text-align:center; margin-bottom:12px; }
  .m-name { font-size:24px; font-weight:700; text-align:center; margin-bottom:4px; letter-spacing:0.06em; }
  .m-level { text-align:center; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; opacity:.5; margin-bottom:18px; }
  .m-bar-bg { background:rgba(255,255,255,0.07); border-radius:8px; height:6px; margin-bottom:18px; overflow:hidden; }
  .m-bar { height:100%; border-radius:8px; transition:width 1s cubic-bezier(.34,1.56,.64,1); }
  .m-desc { font-size:13px; line-height:1.75; color:rgba(200,220,255,0.72); margin-bottom:20px; text-align:center; }
  .m-tags { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:26px; }
  .m-tag { padding:4px 13px; border-radius:20px; font-size:10px; letter-spacing:0.12em;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.75); }
  /* Link buttons */
  .m-links { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; justify-content:center; }
  .m-link {
    display:inline-flex; align-items:center; gap:6px;
    padding:9px 18px; border-radius:10px; font-family:'Courier New',monospace;
    font-size:11px; letter-spacing:0.1em; cursor:pointer; text-transform:uppercase;
    border:1px solid; transition:all 0.2s; pointer-events:all; text-decoration:none;
    background:rgba(255,255,255,0.04);
  }
  .m-link:hover { transform:translateY(-2px); filter:brightness(1.3); box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  .m-btn {
    display:block; width:100%; padding:11px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
    border-radius:11px; color:rgba(255,255,255,0.35); font-family:'Courier New',monospace;
    font-size:11px; letter-spacing:0.15em; cursor:pointer; text-transform:uppercase;
    transition:all 0.2s; pointer-events:all;
  }
  .m-btn:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); }

  /* Minimap redesign — dark tactical */
  #minimap-wrap {
    position:absolute; bottom:24px; right:24px;
    border-radius:8px; overflow:hidden;
    border:1px solid rgba(0,255,180,0.2);
    box-shadow:0 0 0 1px rgba(0,0,0,0.5), 0 8px 32px rgba(0,0,0,0.6);
  }
  #minimap-label {
    position:absolute; bottom:148px; right:24px;
    color:rgba(0,255,180,0.45); font-size:9px; letter-spacing:0.2em;
    text-transform:uppercase; text-align:right; pointer-events:none;
  }
</style>
</head>

  <div id="fps-counter">FPS: --</div>

  <div id="modal">

</div>

<script>

  {

  {

    links:[{label:'Email',url:'mailto:dev@email.com',icon:'📧'},{label:'LinkedIn',url:'https://linkedin.com',icon:'💼'},{label:'Discord',url:'#',icon:'💬'}]

  {

    desc:'Guiando outros desenvolvedores através do vasto oceano da tecnologia. Confira meus artigos, tutoriais e contribuições open source.',
    extra:'✍️ 8 artigos publicados | 👥 500+ seguidores | 🌟 Mentor voluntário',

// ═══════════════════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
// ✅ OPT: cap pixel ratio at 1.5 — huge GPU saving on retina displays
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05111f);
scene.fog = new THREE.FogExp2(0x05192e, 0.014); // ✅ OPT: ligeiramente menos denso

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200); // ✅ OPT: far plane 300→200
camera.position.set(0, 9, 12);

// ═══════════════════════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x0a1530, 1.2));

const moon = new THREE.DirectionalLight(0xffe8cc, 0.6);
moon.position.set(-40, 80, -30);
moon.castShadow = true;
// ✅ OPT: shadow map 2048→1024 — metade da memória GPU, imperceptível na prática
moon.shadow.mapSize.set(1024, 1024);
moon.shadow.camera.near = 1;
moon.shadow.camera.far = 180;
moon.shadow.camera.left = -50; moon.shadow.camera.right = 50;
moon.shadow.camera.top = 50;  moon.shadow.camera.bottom = -50;
// ✅ OPT: bias corrigido para -0.003 — elimina shadow acne nos prédios
moon.shadow.bias = -0.003;
scene.add(moon);

scene.add(new THREE.HemisphereLight(0x0a1530, 0x030812, 0.6));

// Moon sphere
const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(6, 12, 12), // ✅ OPT: 16→12 segmentos (lua distante)
  new THREE.MeshBasicMaterial({color:0xfff5cc})
);
moonMesh.position.set(-80, 90, -120);
scene.add(moonMesh);
const moonLight = new THREE.PointLight(0xffe8aa, 0.4, 250); moonLight.position.copy(moonMesh.position); scene.add(moonLight);

// ═══════════════════════════════════════════════════════════════
//  STARS — ✅ OPT: uma só geometria, sem loop de arrays separado
// ═══════════════════════════════════════════════════════════════
(function makeStars() {
  const COUNT = 2500; // ✅ OPT: 3000→2500
  const pos = new Float32Array(COUNT * 3);
  const col = new Float32Array(COUNT * 3);
  for (let i = 0; i < COUNT; i++) {
    const r = 170 + Math.random()*80;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI*0.5;
    pos[i*3]   = Math.cos(theta)*Math.cos(phi)*r;
    pos[i*3+1] = Math.sin(phi)*r + 10;
    pos[i*3+2] = Math.sin(theta)*Math.cos(phi)*r;
    const t = Math.random();
    col[i*3]=0.8+t*0.2; col[i*3+1]=0.85+t*0.15; col[i*3+2]=0.9+t*0.1;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({size:0.45, vertexColors:true, transparent:true, opacity:0.9})));
})();

// ═══════════════════════════════════════════════════════════════
//  OCEAN — ✅ OPT: geometria 80×80 → 32×32 (6561→1089 vértices)
// ═══════════════════════════════════════════════════════════════
const OCEAN_SEG = 32;
const oceanGeo = new THREE.PlaneGeometry(600, 600, OCEAN_SEG, OCEAN_SEG);
const oceanMat = new THREE.MeshPhongMaterial({
  color:0x0d2a3e, specular:0x1e6080, shininess:100, transparent:true, opacity:0.90
});
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.rotation.x = -Math.PI/2; ocean.position.y = -0.8;
scene.add(ocean);
const oceanPos = oceanGeo.attributes.position;
// ✅ OPT: cache Float32Array direto — evita getY/setY por vértice
const oceanBaseY = new Float32Array(oceanPos.array);

// ═══════════════════════════════════════════════════════════════
//  ISLAND
// ═══════════════════════════════════════════════════════════════
function makeIsland() {
  const g = new THREE.Group();
  const snowMat  = new THREE.MeshLambertMaterial({color:0x2d7a3a});
  const rimMat   = new THREE.MeshLambertMaterial({color:0xd4c89a});
  const roadMat  = new THREE.MeshLambertMaterial({color:0xc8a870});
  const bumpMat  = new THREE.MeshLambertMaterial({color:0x3a8c45});
  const stoneMat = new THREE.MeshLambertMaterial({color:0xc0a060});

  { const m=new THREE.Mesh(new THREE.CylinderGeometry(58,61,1.8,64),snowMat); m.position.set(0,0.3,0); m.receiveShadow=true; g.add(m); }
  { const m=new THREE.Mesh(new THREE.CylinderGeometry(61,63,1.2,64),rimMat); m.position.set(0,-0.1,0); m.receiveShadow=true; g.add(m); }

  // Ground detail bumps (rocks / bushes)
  const bumpGeo = new THREE.SphereGeometry(0.5, 6, 5);
  for (let i = 0; i < 80; i++) {
    const r = 4+Math.random()*52, a = Math.random()*Math.PI*2;
    const bump = new THREE.Mesh(bumpGeo, bumpMat);
    const sc = 0.6+Math.random()*1.2;
    bump.scale.set(sc, 0.35*sc, sc);
    bump.position.set(Math.cos(a)*r, 1.3, Math.sin(a)*r);
    g.add(bump);
  }

  // Roads
  const roadGeoH = new THREE.BoxGeometry(116,0.05,2.2);
  const dashGeo  = new THREE.BoxGeometry(1.6,0.06,0.25);
  const dashMat  = new THREE.MeshBasicMaterial({color:0xffffff});
  [0,90].forEach(angle => {
    const road = new THREE.Mesh(roadGeoH, roadMat);
    road.position.y=1.22; road.rotation.y=angle*Math.PI/180; road.receiveShadow=true; g.add(road);
    for (let d=-50; d<=50; d+=4) {
      const dash = new THREE.Mesh(dashGeo, dashMat);
      dash.position.y=1.24;
      dash.position.x = angle===0?d:0;
      dash.position.z = angle===0?0:d;
      if(angle===90) dash.rotation.y=Math.PI/2;
      g.add(dash);
    }
  });

  // Paths to skills — ✅ OPT: shared geo+mat por caminho
  const pathGeo = new THREE.BoxGeometry(0.8,0.08,0.8);
  SKILLS.forEach(sk => {
    for (let t=0; t<=1; t+=1/12) {
      const stone = new THREE.Mesh(pathGeo, stoneMat);
      stone.position.set(sk.pos.x*t, 1.25, sk.pos.z*t);

// Materiais de árvores tropicais
const PALM_TRUNK_MAT = new THREE.MeshLambertMaterial({color:0x8b6340});
const PALM_LEAF_MAT  = new THREE.MeshLambertMaterial({color:0x2d8c2d});
const PALM_LEAF_MAT2 = new THREE.MeshLambertMaterial({color:0x1a6b1a});
const BUSH_MAT       = new THREE.MeshLambertMaterial({color:0x2a7a30});
const BUSH_MAT2      = new THREE.MeshLambertMaterial({color:0x3a9940});

function makePalmTree(x, z, scale=1) {
  const g = new THREE.Group();
  const s = scale;
  // Tronco curvado (empilhado com inclinação)
  const segs = 5;
  let cy = 0, cx2 = 0, cz2 = 0;
  const lean = (Math.random()-0.5)*0.18;
  const leanZ = (Math.random()-0.5)*0.18;
  for(let i=0;i<segs;i++){
    const r1 = (0.18-i*0.025)*s, r2 = (0.16-i*0.025)*s, h = 1.0*s;
    const seg = new THREE.Mesh(new THREE.CylinderGeometry(r2,r1,h,8), PALM_TRUNK_MAT);
    seg.position.set(cx2, cy+h/2, cz2);
    seg.rotation.set(lean, 0, leanZ);
    seg.castShadow=true; g.add(seg);
    cy += h*0.92; cx2 += lean*h*0.5; cz2 += leanZ*h*0.5;
  }
  // Coco
  const coconutH = cy;
  for(let i=0;i<2;i++){
    const coco = new THREE.Mesh(new THREE.SphereGeometry(0.14*s,7,7), new THREE.MeshLambertMaterial({color:0x6b4c2a}));
    coco.position.set(cx2+(Math.random()-0.5)*0.3*s, coconutH-0.2, cz2+(Math.random()-0.5)*0.3*s);
    g.add(coco);
  }
  // Folhas em leque
  const leafCount = 6 + Math.floor(Math.random()*3);
  for(let i=0;i<leafCount;i++){
    const a = (i/leafCount)*Math.PI*2;
    const leaf = new THREE.Mesh(
      new THREE.ConeGeometry(0.12*s, 1.8*s, 4),
      i%2===0?PALM_LEAF_MAT:PALM_LEAF_MAT2
    );
    leaf.position.set(cx2+Math.cos(a)*0.3*s, coconutH+0.1, cz2+Math.sin(a)*0.3*s);
    leaf.rotation.set(Math.PI/3, a, 0);
    leaf.castShadow=true; g.add(leaf);
  }
  g.position.set(x, 1.2, z);
  g.rotation.y = Math.random()*Math.PI*2;
  return g;
}

function makeBush(x, z, scale=1) {
  const g = new THREE.Group();
  const s = scale;
  const layers = 2+Math.floor(Math.random()*2);
  for(let i=0;i<layers;i++){
    const bush = new THREE.Mesh(
      new THREE.SphereGeometry((0.5+Math.random()*0.4)*s, 7, 6),
      i%2===0?BUSH_MAT:BUSH_MAT2
    );
    bush.scale.y = 0.7;
    bush.position.set((Math.random()-0.5)*0.5*s, (0.3+i*0.25)*s, (Math.random()-0.5)*0.5*s);
    bush.castShadow=true; g.add(bush);
  }
  g.position.set(x, 1.2, z);
  return g;
}

//  FIREFLIES — partículas douradas flutuantes
// ═══════════════════════════════════════════════════════════════
const FF_COUNT = 180;
const ffPositions = new Float32Array(FF_COUNT * 3);
const ffPhases    = new Float32Array(FF_COUNT);
const ffRadii     = new Float32Array(FF_COUNT);
const ffSpeeds    = new Float32Array(FF_COUNT);
for (let i = 0; i < FF_COUNT; i++) {
  const r = 4 + Math.random()*54;
  const a = Math.random()*Math.PI*2;
  ffPositions[i*3]   = Math.cos(a)*r;
  ffPositions[i*3+1] = 1.5 + Math.random()*5;
  ffPositions[i*3+2] = Math.sin(a)*r;
  ffPhases[i]  = Math.random()*Math.PI*2;
  ffRadii[i]   = r;
  ffSpeeds[i]  = 0.2 + Math.random()*0.5;
}
const ffGeo = new THREE.BufferGeometry();
ffGeo.setAttribute('position', new THREE.BufferAttribute(ffPositions, 3));
const ffMesh = new THREE.Points(ffGeo,
  new THREE.PointsMaterial({color:0xffdd88, size:0.22, transparent:true, opacity:0.85, sizeAttenuation:true})
);
scene.add(ffMesh);

function updateFireflies() {
  const p = ffGeo.attributes.position.array;
  for (let i = 0; i < FF_COUNT; i++) {
    ffPhases[i] += ffSpeeds[i] * 0.008;
    const a = ffPhases[i];
    p[i*3]   = Math.cos(a)*ffRadii[i] + Math.sin(a*2.3)*1.5;
    p[i*3+1] = ffPositions[i*3+1] + Math.sin(a*1.7 + i)*0.6;
    p[i*3+2] = Math.sin(a)*ffRadii[i] + Math.cos(a*1.8)*1.5;
  }
  ffGeo.attributes.position.needsUpdate = true;
}

const mmCanvas = document.getElementById('minimap');
mmCanvas.width=130; mmCanvas.height=130;
const mmCtx = mmCanvas.getContext('2d');
// ✅ OPT: minimap só re-renderiza se jogador moveu (dirty flag)
let minimapDirty = true;
let lastPlayerX = null, lastPlayerZ = null;

function drawMinimap() {
  const W=130,H=130,cx=65,cy=65,sc2=1.05;
  mmCtx.clearRect(0,0,W,H);

  // Dark tactical background
  mmCtx.fillStyle='#040e18';
  mmCtx.fillRect(0,0,W,H);

  // Grid lines
  mmCtx.strokeStyle='rgba(0,255,180,0.07)'; mmCtx.lineWidth=1;
  for(let g=0;g<W;g+=13){
    mmCtx.beginPath(); mmCtx.moveTo(g,0); mmCtx.lineTo(g,H); mmCtx.stroke();
    mmCtx.beginPath(); mmCtx.moveTo(0,g); mmCtx.lineTo(W,g); mmCtx.stroke();
  }

  // Island fill — dark teal
  mmCtx.beginPath(); mmCtx.arc(cx,cy,62,0,Math.PI*2);
  mmCtx.fillStyle='#071c18'; mmCtx.fill();
  mmCtx.strokeStyle='rgba(0,255,180,0.15)'; mmCtx.lineWidth=1; mmCtx.stroke();

  // Roads
  mmCtx.strokeStyle='rgba(0,255,180,0.2)'; mmCtx.lineWidth=2.5;
  mmCtx.setLineDash([4,4]);
  mmCtx.beginPath(); mmCtx.moveTo(cx-62,cy); mmCtx.lineTo(cx+62,cy); mmCtx.stroke();
  mmCtx.beginPath(); mmCtx.moveTo(cx,cy-62); mmCtx.lineTo(cx,cy+62); mmCtx.stroke();
  mmCtx.setLineDash([]);

  // Scan line animation
  const scanY = cy + Math.sin(Date.now()*0.001)*48;
  const scanGrad = mmCtx.createLinearGradient(0,scanY-6,0,scanY+6);
  scanGrad.addColorStop(0,'rgba(0,255,180,0)');
  scanGrad.addColorStop(0.5,'rgba(0,255,180,0.08)');
  scanGrad.addColorStop(1,'rgba(0,255,180,0)');
  mmCtx.fillStyle=scanGrad;
  mmCtx.fillRect(0,scanY-6,W,12);

  // Interactable nodes
  INTERACTABLES.forEach(it=>{
    const mx=cx+it.pos.x*sc2, my=cy+it.pos.z*sc2;
    mmCtx.beginPath(); mmCtx.arc(mx,my,3.5,0,Math.PI*2);
    mmCtx.fillStyle='#'+it.color.toString(16).padStart(6,'0')+'cc'; mmCtx.fill();
    mmCtx.fillStyle='rgba(255,255,255,0.4)'; mmCtx.font='6px monospace';
    mmCtx.textAlign='center'; mmCtx.fillText(it.icon,mx,my+1);
  });

  // Skill nodes
  SKILLS.forEach(sk=>{
    const mx=cx+sk.pos.x*sc2, my=cy+sk.pos.z*sc2;
    // Pulse ring
    const pulse=0.5+Math.sin(Date.now()*0.003)*0.5;
    mmCtx.beginPath(); mmCtx.arc(mx,my,7+pulse*3,0,Math.PI*2);
    mmCtx.strokeStyle='#'+sk.color.toString(16).padStart(6,'0')+'44'; mmCtx.lineWidth=1; mmCtx.stroke();
    // Core dot
    mmCtx.beginPath(); mmCtx.arc(mx,my,4,0,Math.PI*2);
    mmCtx.fillStyle='#'+sk.color.toString(16).padStart(6,'0'); mmCtx.fill();
    // Label
    mmCtx.fillStyle='rgba(255,255,255,0.55)'; mmCtx.font='bold 7px monospace';
    mmCtx.textAlign='center'; mmCtx.fillText(sk.name.split(' ')[0], mx, my-9);
  });

  // Player dot
  const px=cx+player.position.x*sc2, py=cy+player.position.z*sc2;
  mmCtx.beginPath(); mmCtx.arc(px,py,4,0,Math.PI*2);
  mmCtx.fillStyle='#00ffb4'; mmCtx.fill();
  // Player direction indicator
  const pdx=Math.sin(-player.rotation.y)*7, pdz=Math.cos(-player.rotation.y)*7;
  mmCtx.beginPath(); mmCtx.moveTo(px,py); mmCtx.lineTo(px+pdx,py+pdz);
  mmCtx.strokeStyle='#00ffb4'; mmCtx.lineWidth=2; mmCtx.stroke();
  // Outer ring
  mmCtx.beginPath(); mmCtx.arc(px,py,7,0,Math.PI*2);
  mmCtx.strokeStyle='rgba(0,255,180,0.4)'; mmCtx.lineWidth=1; mmCtx.stroke();

  // Border
  mmCtx.strokeStyle='rgba(0,255,180,0.2)'; mmCtx.lineWidth=1;
  mmCtx.strokeRect(0,0,W,H);

  // Corner markers
  const corners=[[0,0],[W,0],[0,H],[W,H]];
  corners.forEach(([cx2,cy2])=>{
    const sx=cx2===0?1:-1, sy=cy2===0?1:-1;
    mmCtx.strokeStyle='rgba(0,255,180,0.5)'; mmCtx.lineWidth=1.5;
    mmCtx.beginPath(); mmCtx.moveTo(cx2+sx*2,cy2+sy*8); mmCtx.lineTo(cx2+sx*2,cy2+sy*2); mmCtx.lineTo(cx2+sx*8,cy2+sy*2); mmCtx.stroke();
  });
}

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════
const keys = {};
let yaw=0, pitch=0.38, locked=false;
let nearSkill=null, modalOpen=false;
let walkT=0;

document.addEventListener('keydown', e => { keys[e.code]=true; });
document.addEventListener('keyup',   e => { keys[e.code]=false; });
canvas.addEventListener('click', () => { if(!modalOpen) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => { locked=!!document.pointerLockElement; });
document.addEventListener('mousemove', e => {
  if(!locked) return;
  yaw -= e.movementX*0.003;
  pitch = Math.max(0.08, Math.min(0.85, pitch-e.movementY*0.003));
});

document.addEventListener('keydown', e => {
  if(e.code==='KeyE' && nearSkill && !modalOpen) openModal(nearSkill);
  if(e.code==='Escape' && modalOpen) closeModal();
});

const cur = document.getElementById('custom-cursor');
document.addEventListener('mousemove', e => { cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });

// ✅ OPT: pause quando aba perde foco
document.addEventListener('visibilitychange', () => { if(document.hidden) Object.keys(keys).forEach(k=>delete keys[k]); });

function openModal(sk) {
  modalOpen=true;
  if(document.pointerLockElement) document.exitPointerLock();
  document.getElementById('m-icon').textContent=sk.icon;
  document.getElementById('m-name').textContent=sk.name;
  document.getElementById('m-name').style.color=sk.hex;
  document.getElementById('m-level').textContent='Nível: '+sk.level;
  document.getElementById('m-desc').textContent=sk.desc;
  // Extra info block
  let extraEl=document.getElementById('m-extra');
  if(!extraEl){extraEl=document.createElement('div');extraEl.id='m-extra';extraEl.style.cssText='font-size:12px;line-height:2;color:rgba(180,220,255,0.6);text-align:center;margin-bottom:14px;white-space:pre-line;';document.getElementById('m-desc').after(extraEl);}
  extraEl.textContent=sk.extra||'';
  document.getElementById('m-bar').style.width='0%';
  document.getElementById('m-bar').style.background=`linear-gradient(90deg,${sk.hex},${sk.hex}aa)`;
  const tags=document.getElementById('m-tags');
  tags.innerHTML='';
  sk.tags.forEach(t=>{const s=document.createElement('span');s.className='m-tag';s.style.borderColor=sk.hex+'55';s.style.color=sk.hex;s.textContent=t;tags.appendChild(s);});
  // Links
  const linksEl=document.getElementById('m-links');
  linksEl.innerHTML='';
  (sk.links||[]).forEach(lk=>{
    const a=document.createElement('a');
    a.className='m-link'; a.href=lk.url; a.target='_blank'; a.rel='noopener';
    a.style.borderColor=sk.hex+'55'; a.style.color=sk.hex;
    a.innerHTML=lk.icon+' '+lk.label;
    linksEl.appendChild(a);
  });
  // Dynamic modal border color
  const md=document.getElementById('modal');
  md.style.borderColor=sk.hex+'30';
  md.style.boxShadow='0 30px 80px rgba(0,0,0,0.8), 0 0 40px '+sk.hex+'18';
  md.style.display='block';
  requestAnimationFrame(()=>{ md.classList.add('show'); setTimeout(()=>{ document.getElementById('m-bar').style.width=sk.pct+'%'; },120); });
}
window.closeModal=function(){ document.getElementById('modal').classList.remove('show'); setTimeout(()=>{ document.getElementById('modal').style.display='none'; },400); modalOpen=false; };

// ═══════════════════════════════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════════════════════════════
let lp=0;
const lbar=document.getElementById('load-bar'),lel=document.getElementById('loading');
function doLoad(){ lp+=8+Math.random()*14; if(lp>=100){lp=100;lbar.style.width='100%';setTimeout(()=>{lel.style.opacity='0';setTimeout(()=>lel.style.display='none',900);},400);return;} lbar.style.width=lp+'%'; setTimeout(doLoad,80+Math.random()*120); }
doLoad();

// ═══════════════════════════════════════════════════════════════
//  FPS COUNTER
// ═══════════════════════════════════════════════════════════════
const fpsEl = document.getElementById('fps-counter');
let fpsFrames=0, fpsLast=performance.now();

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP — otimizado
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
let time=0;
const ISLAND_R=58, WALK_SPD=6, RUN_SPD=13;
const camTarget = new THREE.Vector3();  // ✅ OPT: reutiliza vetor de câmera
const fwdVec    = new THREE.Vector3();
const rgtVec    = new THREE.Vector3();
const dirVec    = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  time += dt;

  // ── FPS counter (atualiza a cada 30 frames) ──────────────────
  fpsFrames++;
  if(fpsFrames>=30){
    const now=performance.now();
    fpsEl.textContent='FPS: '+Math.round(30000/(now-fpsLast));
    fpsLast=now; fpsFrames=0;
  }

  // ── Player movement ──────────────────────────────────────────
  if(!modalOpen){
    const run=keys['ShiftLeft']||keys['ShiftRight'];
    const spd=(run?RUN_SPD:WALK_SPD)*dt;
    fwdVec.set(-Math.sin(yaw),0,-Math.cos(yaw));
    rgtVec.set( Math.cos(yaw),0,-Math.sin(yaw));
    dirVec.set(0,0,0);
    let moved=false;
    if(keys['KeyW']||keys['ArrowUp'])   { dirVec.add(fwdVec); moved=true; }
    if(keys['KeyS']||keys['ArrowDown']) { dirVec.sub(fwdVec); moved=true; }
    if(keys['KeyA']||keys['ArrowLeft']) { dirVec.sub(rgtVec); moved=true; }
    if(keys['KeyD']||keys['ArrowRight']){ dirVec.add(rgtVec); moved=true; }
    if(moved){
      dirVec.normalize();
      const nx=player.position.x+dirVec.x*spd, nz=player.position.z+dirVec.z*spd;
      if(nx*nx+nz*nz < ISLAND_R*ISLAND_R){ player.position.x=nx; player.position.z=nz; }
      player.rotation.y=Math.atan2(dirVec.x,dirVec.z);
      walkT+=(run?14:9)*dt;
      for(const c of playerLimbs){
        if(c.userData.isLeg) c.rotation.x=Math.sin(walkT+c.userData.idx*Math.PI)*0.55;
        else c.rotation.x=Math.sin(walkT+(c.userData.side==='l'?0:Math.PI))*0.45;
      }
      minimapDirty=true;
    } else {
      for(const c of playerLimbs) c.rotation.x*=0.8;
    }
  }

  // Shadow
  shadowCircle.position.set(player.position.x,1.24,player.position.z);

  // Camera
  const cd=10, ch=cd*Math.sin(pitch), cH=cd*Math.cos(pitch);
  camTarget.set(player.position.x+Math.sin(yaw)*cH, player.position.y+ch+1.2, player.position.z+Math.cos(yaw)*cH);
  camera.position.lerp(camTarget,0.12);
  camera.lookAt(player.position.x, player.position.y+1.0, player.position.z);

  // ── Proximity check — skills + interactables ────────────────
  let best=null, bestD=Infinity, bestHex='#7df';
  for(const s of structMeshes){
    const dx=player.position.x-s.position.x, dz=player.position.z-s.position.z;
    const d2=dx*dx+dz*dz;
    if(d2<36 && d2<bestD){ bestD=d2; best=s.userData.skill; bestHex=s.userData.skill.hex; }
  }
  for(const s of interactMeshes){
    const dx=player.position.x-s.position.x, dz=player.position.z-s.position.z;
    const d2=dx*dx+dz*dz;
    if(d2<36 && d2<bestD){ bestD=d2; best=s.userData.interactable; bestHex=s.userData.interactable.hex; }
  }
  nearSkill=best;
  const prx=document.getElementById('proximity');
  if(best && !modalOpen){
    prx.classList.add('show');
    document.getElementById('prox-text').textContent='Explorar: '+best.name;
    document.getElementById('hud-area').textContent=best.name;
    document.getElementById('hud-area').style.color=bestHex;
  } else {
    prx.classList.remove('show');
    document.getElementById('hud-area').textContent='Explorando...';
    document.getElementById('hud-area').style.color='rgba(255,255,255,0.5)';
  }

  // ── Ocean animation — ✅ OPT: acesso direto ao Float32Array ──
  const oArr = oceanPos.array;
  const oBase = oceanBaseY;
  const t1 = time*1.1, t2 = time*0.7;
  for(let i=0; i<oceanPos.count; i++){
    const base = i*3;
    const x=oArr[base], z=oArr[base+2];
    oArr[base+1] = oBase[base+1] + Math.sin(t1+x*0.08)*0.25 + Math.cos(t2+z*0.1)*0.18;
  }
  oceanPos.needsUpdate=true;

  // ── Skill lights pulse ───────────────────────────────────────
  for(let i=0;i<structLights.length;i++)
    structLights[i].light.intensity = structLights[i].base + Math.sin(time*2+i*1.3)*0.6;

  // ── Spin star (skyscraper) ───────────────────────────────────
  for(const obj of spinObjects) obj.rotation.y = time*2;

  // ── Glow rings pulse ─────────────────────────────────────────
  for(let i=0;i<glowRings.length;i++){
    const sc=1+Math.sin(time*3+i)*0.05;
    glowRings[i].scale.x=glowRings[i].scale.z=sc;
  }

  // ── Interactable animations ──────────────────────────────────
  // Beacon rotation (lighthouse)
  beaconLights.forEach(({light,parent})=>{
    const angle = time*0.8;
    light.target.position.set(
      parent.position.x+Math.cos(angle)*50,
      0,
      parent.position.z+Math.sin(angle)*50
    );
    light.target.updateMatrixWorld();
  });
  // Flag wave
  flagMeshes.forEach(f=>{ f.rotation.z=Math.sin(time*3)*0.25; });
  // Water drops (fountain)
  waterDrops.forEach(d=>{
    d.position.y=2.9+Math.sin(time*4+d.userData.dropIdx*0.8)*0.25;
    d.position.x=Math.cos(time*2+d.userData.dropIdx)*0.3;
    d.position.z=Math.sin(time*2+d.userData.dropIdx)*0.3;
  });
  // Glitter orbiters (gift)
  glitterOrbiters.forEach(({mesh,cx,cz},i)=>{
    const a=time*1.5+i*(Math.PI*2/12);
    mesh.position.set(cx+Math.cos(a)*2.2, 1.2+2.4+Math.sin(time*3+i)*0.3, cz+Math.sin(a)*2.2);
  });

  // ── Snow (GPU) ───────────────────────────────────────────────
  updateFireflies();

  // ── Minimap (animated — always redraw) ─────────────────────────
  drawMinimap();

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
