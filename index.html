<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Island 🎄</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#020810; font-family:'Courier New',monospace; cursor:none; }

  #custom-cursor {
    position:fixed; width:12px; height:12px; border-radius:50%;
    background:#fff; pointer-events:none; z-index:9999;
    transform:translate(-50%,-50%); mix-blend-mode:difference;
    transition:transform 0.1s;
  }

  /* LOADING */
  #loading {
    position:fixed; inset:0; background:#020810;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:200; transition:opacity 1s ease;
  }
  #loading .snow { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  #loading h1 {
    font-size:32px; color:#e8f4f8; letter-spacing:0.4em; text-transform:uppercase;
    margin-bottom:6px; text-shadow:0 0 30px rgba(150,220,255,0.8);
  }
  #loading .subtitle { color:rgba(150,200,255,0.5); font-size:12px; letter-spacing:0.3em; margin-bottom:50px; }
  #load-bar-bg { width:280px; height:2px; background:rgba(255,255,255,0.1); border-radius:2px; }
  #load-bar { height:100%; background:linear-gradient(90deg,#4af,#8ff); border-radius:2px; width:0%; transition:width 0.2s; }
  #load-tip { margin-top:16px; color:rgba(255,255,255,0.25); font-size:11px; letter-spacing:0.15em; }

  /* HUD */
  #hud {
    position:fixed; top:0; left:0; right:0; bottom:0;
    pointer-events:none; z-index:10;
  }
  #hud-title {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:12px;
    background:rgba(2,8,20,0.75); backdrop-filter:blur(12px);
    border:1px solid rgba(100,200,255,0.2); border-radius:50px;
    padding:10px 26px; white-space:nowrap;
  }
  #hud-title .dot { width:7px; height:7px; border-radius:50%; background:#4af;
    box-shadow:0 0 8px #4af; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  #hud-title span { color:#8de; font-size:12px; letter-spacing:0.2em; text-transform:uppercase; }
  #hud-area { color:rgba(255,255,255,0.5)!important; }

  #controls {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center;
    background:rgba(2,8,20,0.7); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08); border-radius:30px;
    padding:9px 20px; color:rgba(255,255,255,0.45); font-size:11px; letter-spacing:0.1em;
  }
  .kbd {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:22px; height:22px; padding:0 5px;
    border-radius:4px; background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2); color:#ccc; font-size:10px; font-weight:bold;
  }
  .sep { opacity:.3; margin:0 4px; }

  #proximity {
    position:absolute; bottom:76px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px;
    background:rgba(2,8,20,0.85); backdrop-filter:blur(10px);
    border:1px solid rgba(80,200,255,0.4); border-radius:12px;
    padding:10px 20px; color:#7df; font-size:12px; letter-spacing:0.1em;
    opacity:0; transition:opacity 0.3s; pointer-events:none;
  }
  #proximity.show { opacity:1; }

  /* MINIMAP */
  #minimap-wrap {
    position:absolute; bottom:24px; right:24px;
    border-radius:50%; overflow:hidden;
    border:2px solid rgba(80,200,255,0.25);
    box-shadow:0 0 20px rgba(0,100,200,0.3);
  }

  /* MODAL */
  #modal {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.9);
    width:440px; max-width:94vw;
    background:linear-gradient(160deg, rgba(5,15,35,0.97), rgba(2,8,25,0.97));
    backdrop-filter:blur(24px);
    border:1px solid rgba(80,180,255,0.15); border-radius:22px;
    padding:38px; pointer-events:all;
    opacity:0; transition:all 0.4s cubic-bezier(.34,1.56,.64,1);
    display:none; box-shadow:0 30px 80px rgba(0,0,0,0.8), 0 0 40px rgba(30,100,200,0.15);
  }
  #modal.show { opacity:1; transform:translate(-50%,-50%) scale(1); display:block; }
  #modal-snowflakes {
    position:absolute; top:0; left:0; right:0; height:80px;
    overflow:hidden; border-radius:22px 22px 0 0; pointer-events:none;
  }
  .m-icon { font-size:56px; text-align:center; margin-bottom:12px; position:relative; z-index:1; }
  .m-name { font-size:24px; font-weight:700; text-align:center; margin-bottom:4px; letter-spacing:0.06em; }
  .m-level { text-align:center; font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
    opacity:.5; margin-bottom:18px; }
  .m-bar-bg { background:rgba(255,255,255,0.07); border-radius:8px; height:6px; margin-bottom:18px; overflow:hidden; }
  .m-bar { height:100%; border-radius:8px; transition:width 1s cubic-bezier(.34,1.56,.64,1); }
  .m-desc { font-size:13px; line-height:1.75; color:rgba(200,220,255,0.72); margin-bottom:20px; text-align:center; }
  .m-tags { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:26px; }
  .m-tag { padding:4px 13px; border-radius:20px; font-size:10px; letter-spacing:0.12em;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.75); }
  .m-btn {
    display:block; width:100%; padding:13px;
    background:rgba(80,160,255,0.1); border:1px solid rgba(80,160,255,0.3);
    border-radius:11px; color:#7df; font-family:'Courier New',monospace;
    font-size:12px; letter-spacing:0.15em; cursor:pointer; text-transform:uppercase;
    transition:all 0.2s; pointer-events:all;
  }
  .m-btn:hover { background:rgba(80,160,255,0.2); box-shadow:0 0 20px rgba(80,160,255,0.2); }

  /* Snowfall canvas overlay */
  #snow-canvas { position:fixed; inset:0; pointer-events:none; z-index:5; }
</style>
</head>
<body>

<div id="custom-cursor"></div>

<div id="loading">
  <div class="snow" id="load-snow"></div>
  <h1>🎄 Portfolio Island</h1>
  <div class="subtitle">Christmas Night Edition</div>
  <div id="load-bar-bg"><div id="load-bar"></div></div>
  <div id="load-tip">Decorando a ilha... ❄️</div>
</div>

<canvas id="canvas"></canvas>
<canvas id="snow-canvas"></canvas>

<div id="hud">
  <div id="hud-title">
    <div class="dot"></div>
    <span>Portfolio Island</span>
    <span style="opacity:.3">|</span>
    <span id="hud-area" class="hud-area">Explorando...</span>
  </div>
  <div id="proximity">
    <span class="kbd">E</span>
    <span id="prox-text">Explorar</span>
  </div>
  <div id="controls">
    <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span>
    <span>Mover</span><span class="sep">|</span>
    <span class="kbd">E</span><span>Interagir</span><span class="sep">|</span>
    <span class="kbd">⇧</span><span>Correr</span><span class="sep">|</span>
    <span class="kbd">🖱️</span><span>Câmera</span>
  </div>
  <div id="minimap-wrap"><canvas id="minimap" width="120" height="120"></canvas></div>

  <div id="modal">
    <div id="modal-snowflakes"></div>
    <div class="m-icon" id="m-icon">🟢</div>
    <div class="m-name" id="m-name">Node.js</div>
    <div class="m-level" id="m-level">Avançado</div>
    <div class="m-bar-bg"><div class="m-bar" id="m-bar" style="width:0%"></div></div>
    <div class="m-desc" id="m-desc"></div>
    <div class="m-tags" id="m-tags"></div>
    <button class="m-btn" onclick="closeModal()">[ Fechar ] ✕</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  SKILLS
// ═══════════════════════════════════════════════════════
const SKILLS = [
  {
    id:'nodejs', name:'Node.js', icon:'🟢', level:'Avançado', pct:88,
    color:0x22cc55, hex:'#22cc55', glow:0x00ff66,
    pos:{x:18, z:-14},
    desc:'APIs RESTful, microsserviços e aplicações backend escaláveis. Experiência com Express, Fastify e arquitetura event-driven.',
    tags:['Express.js','REST API','NPM','Event Loop','Microservices'],
    type:'tower'
  },
  {
    id:'html', name:'HTML5', icon:'🧡', level:'Especialista', pct:95,
    color:0xff5522, hex:'#ff5522', glow:0xff7744,
    pos:{x:-18, z:-12},
    desc:'Marcação semântica, acessibilidade ARIA, SEO técnico e web components modernos com formulários avançados.',
    tags:['Semântica','Acessibilidade','SEO','Forms','Web Components'],
    type:'cathedral'
  },
  {
    id:'css', name:'CSS3', icon:'💙', level:'Especialista', pct:92,
    color:0x2266ff, hex:'#2266ff', glow:0x44aaff,
    pos:{x:-20, z:14},
    desc:'Animações avançadas, Grid, Flexbox, variáveis customizadas e design responsivo pixel-perfect.',
    tags:['Grid','Flexbox','Animations','SASS/SCSS','Responsive'],
    type:'palace'
  },
  {
    id:'js', name:'JavaScript', icon:'⚡', level:'Avançado', pct:90,
    color:0xffcc00, hex:'#ffcc00', glow:0xffee44,
    pos:{x:20, z:14},
    desc:'ES2022+, manipulação DOM, async/await, closures, design patterns e tipagem dinâmica avançada.',
    tags:['ES2022+','Async/Await','DOM','Closures','Design Patterns'],
    type:'skyscraper'
  },
  {
    id:'spring', name:'Spring Boot', icon:'🍃', level:'Intermediário', pct:72,
    color:0x55bb33, hex:'#55bb33', glow:0x88ee44,
    pos:{x:0, z:-24},
    desc:'Aplicações Java enterprise com Spring Security, JPA/Hibernate e injeção de dependência.',
    tags:['Java','Spring MVC','JPA','REST','Spring Security'],
    type:'shrine'
  }
];

// ═══════════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020810);
scene.fog = new THREE.FogExp2(0x030d1e, 0.022);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 9, 12);

// ═══════════════════════════════════════════════════════
//  LIGHTING — CHRISTMAS NIGHT
// ═══════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x0a1530, 1.2));

// Moon
const moon = new THREE.DirectionalLight(0x8ab4dd, 0.5);
moon.position.set(-40, 80, -30);
moon.castShadow = true;
moon.shadow.mapSize.set(2048,2048);
moon.shadow.camera.near = 1; moon.shadow.camera.far = 200;
[-55,55].forEach(v => {
  moon.shadow.camera.left = v < 0 ? v : moon.shadow.camera.left;
  moon.shadow.camera.right = v > 0 ? v : moon.shadow.camera.right;
  moon.shadow.camera.top = v > 0 ? v : moon.shadow.camera.top;
  moon.shadow.camera.bottom = v < 0 ? v : moon.shadow.camera.bottom;
});
moon.shadow.camera.left = -55; moon.shadow.camera.right = 55;
moon.shadow.camera.top = 55; moon.shadow.camera.bottom = -55;
moon.shadow.bias = -0.001;
scene.add(moon);

// Warm fill from below
const warmFill = new THREE.HemisphereLight(0x0a1530, 0x030812, 0.6);
scene.add(warmFill);

// ═══════════════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════════════
function makeStars() {
  const geo = new THREE.BufferGeometry();
  const pos = [], col = [];
  for (let i = 0; i < 3000; i++) {
    const r = 180 + Math.random()*80;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI*0.5;
    pos.push(Math.cos(theta)*Math.cos(phi)*r, Math.sin(phi)*r + 10, Math.sin(theta)*Math.cos(phi)*r);
    const t = Math.random();
    col.push(0.8+t*0.2, 0.85+t*0.15, 0.9+t*0.1);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({size:0.45, vertexColors:true, transparent:true, opacity:0.9});
  scene.add(new THREE.Points(geo, mat));
}
makeStars();

// Moon sphere
const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(6,16,16),
  new THREE.MeshBasicMaterial({color:0xddeeff})
);
moonMesh.position.set(-80, 90, -120);
scene.add(moonMesh);
// Moon glow
const moonGlow = new THREE.PointLight(0x8ab4dd, 0.3, 250);
moonGlow.position.copy(moonMesh.position);
scene.add(moonGlow);

// ═══════════════════════════════════════════════════════
//  OCEAN
// ═══════════════════════════════════════════════════════
const oceanGeo = new THREE.PlaneGeometry(600,600,80,80);
const oceanMat = new THREE.MeshPhongMaterial({
  color:0x0a1a2e, specular:0x1a4060, shininess:80,
  transparent:true, opacity:0.92
});
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.rotation.x = -Math.PI/2; ocean.position.y = -0.8;
scene.add(ocean);
const oceanPos = oceanGeo.attributes.position;
const oceanOrigY = Array.from({length:oceanPos.count}, (_,i) => oceanPos.getY(i));

// Reflections on water — point lights far out
[-60,60].forEach(x => [-60,60].forEach(z => {
  const l = new THREE.PointLight(0x1a3060, 0.3, 80);
  l.position.set(x,-0.5,z); scene.add(l);
}));

// ═══════════════════════════════════════════════════════
//  FLAT ISLAND
// ═══════════════════════════════════════════════════════
function makeIsland() {
  const g = new THREE.Group();

  // Main flat disc — snow-covered
  const mainGeo = new THREE.CylinderGeometry(34, 36, 1.8, 48);
  const snowMat = new THREE.MeshLambertMaterial({color:0xe8f0f8});
  const main = new THREE.Mesh(mainGeo, snowMat);
  main.position.y = 0.3; main.receiveShadow = true;
  g.add(main);

  // Sand rim
  const rim = new THREE.Mesh(
    new THREE.CylinderGeometry(36, 37.5, 1.2, 48),
    new THREE.MeshLambertMaterial({color:0xd4c89a})
  );
  rim.position.y = -0.1; rim.receiveShadow = true; g.add(rim);

  // Snow texture bumps (small mounds)
  for (let i = 0; i < 40; i++) {
    const r = 4 + Math.random()*28;
    const a = Math.random()*Math.PI*2;
    const bump = new THREE.Mesh(
      new THREE.SphereGeometry(0.3+Math.random()*0.6, 8, 6),
      new THREE.MeshLambertMaterial({color:0xf0f6ff})
    );
    bump.position.set(Math.cos(a)*r, 1.3, Math.sin(a)*r);
    bump.scale.y = 0.35; g.add(bump);
  }

  // Roads — cross pattern
  const roadMat = new THREE.MeshLambertMaterial({color:0xb0bcc8});
  [0,90].forEach(angle => {
    const road = new THREE.Mesh(new THREE.BoxGeometry(68,0.05,2.2), roadMat);
    road.position.y = 1.22; road.rotation.y = angle*Math.PI/180; road.receiveShadow = true;
    g.add(road);
    // Road lines
    for (let d = -28; d <= 28; d += 4) {
      const dash = new THREE.Mesh(new THREE.BoxGeometry(1.6,0.06,0.25),
        new THREE.MeshBasicMaterial({color:0xffffff}));
      dash.position.y = 1.24;
      dash.position.x = angle===0 ? d : 0;
      dash.position.z = angle===0 ? 0 : d;
      if (angle===90) dash.rotation.y = Math.PI/2;
      g.add(dash);
    }
  });

  // Diagonal roads to each skill
  SKILLS.forEach(sk => {
    const steps = 12;
    for (let t = 0; t <= 1; t += 1/steps) {
      const stone = new THREE.Mesh(
        new THREE.BoxGeometry(0.8,0.08,0.8),
        new THREE.MeshLambertMaterial({color:0xc8d4dc})
      );
      stone.position.set(sk.pos.x*t, 1.25, sk.pos.z*t);
      stone.rotation.y = Math.random()*0.3;
      g.add(stone);
    }
  });

  // Street lamps
  const lampPositions = [
    [8,8],[8,-8],[-8,8],[-8,-8],
    [16,0],[-16,0],[0,16],[0,-16],
    [14,14],[14,-14],[-14,14],[-14,-14]
  ];
  lampPositions.forEach(([x,z]) => makeLamp(g, x, z));

  return g;
}

function makeLamp(parent, x, z) {
  const g = new THREE.Group();
  // Pole
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06,0.08,3.5,8),
    new THREE.MeshLambertMaterial({color:0x445566})
  );
  pole.position.y = 1.75; pole.castShadow = true; g.add(pole);
  // Arm
  const arm = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04,0.04,0.8,6),
    new THREE.MeshLambertMaterial({color:0x445566})
  );
  arm.position.set(0.35, 3.55, 0); arm.rotation.z = -Math.PI/6; g.add(arm);
  // Bulb
  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.12,8,8),
    new THREE.MeshBasicMaterial({color:0xfffad0})
  );
  bulb.position.set(0.55, 3.45, 0); g.add(bulb);
  // Light
  const light = new THREE.PointLight(0xfffad0, 0.8, 7);
  light.position.set(0.55, 3.45, 0); g.add(light);

  // Christmas lights on pole (colored dots)
  const xmasColors = [0xff2020,0x20ff20,0x2080ff,0xffcc00,0xff80ff];
  for (let i = 0; i < 8; i++) {
    const xLight = new THREE.Mesh(
      new THREE.SphereGeometry(0.055,6,6),
      new THREE.MeshBasicMaterial({color:xmasColors[i%5]})
    );
    xLight.position.set(
      Math.sin(i*0.9)*0.2, 0.5+i*0.35, Math.cos(i*0.9)*0.2
    );
    g.add(xLight);
  }

  g.position.set(x, 1.2, z);
  parent.add(g);
  return g;
}

const island = makeIsland();
scene.add(island);

// ═══════════════════════════════════════════════════════
//  CHRISTMAS TREES (decorative)
// ═══════════════════════════════════════════════════════
function makeChristmasTree(x, z, scale=1) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12*scale, 0.16*scale, 0.7*scale, 7),
    new THREE.MeshLambertMaterial({color:0x5c3317})
  );
  trunk.position.y = 0.35*scale; trunk.castShadow=true; g.add(trunk);

  const tiers = [
    {r:0.9*scale, h:0.85*scale, y:0.95*scale},
    {r:0.7*scale, h:0.8*scale,  y:1.55*scale},
    {r:0.5*scale, h:0.7*scale,  y:2.05*scale},
    {r:0.3*scale, h:0.6*scale,  y:2.45*scale},
  ];
  const treeMat = new THREE.MeshLambertMaterial({color:0x1a6b1a});
  const snowMat2 = new THREE.MeshLambertMaterial({color:0xe8f4ff});
  tiers.forEach(t => {
    const cone = new THREE.Mesh(new THREE.ConeGeometry(t.r,t.h,10), treeMat);
    cone.position.y = t.y; cone.castShadow=true; g.add(cone);
    // Snow cap
    const snow = new THREE.Mesh(new THREE.ConeGeometry(t.r*0.6,t.h*0.3,10), snowMat2);
    snow.position.y = t.y + t.h*0.35; g.add(snow);
  });

  // Star on top
  const star = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.18*scale,0),
    new THREE.MeshBasicMaterial({color:0xffee00})
  );
  star.position.y = 2.85*scale; star.rotation.y = Math.PI/4;
  const starLight = new THREE.PointLight(0xffee44, 0.4*scale, 3*scale);
  starLight.position.y = 2.85*scale; g.add(starLight);
  g.add(star);

  // Colorful ornaments
  const ornColors = [0xff2020,0x4488ff,0xff9900,0xff44aa,0x44ffaa];
  for (let i = 0; i < 12; i++) {
    const a = (i/12)*Math.PI*2;
    const tier = tiers[Math.floor(Math.random()*tiers.length)];
    const orn = new THREE.Mesh(
      new THREE.SphereGeometry(0.07*scale,7,7),
      new THREE.MeshBasicMaterial({color:ornColors[i%5]})
    );
    orn.position.set(
      Math.cos(a)*tier.r*0.7, tier.y+0.1, Math.sin(a)*tier.r*0.7
    );
    g.add(orn);
  }

  g.position.set(x, 1.2, z);
  return g;
}

const treeSpots = [
  [5,5],[-5,5],[5,-5],[-5,-5],
  [10,2],[-10,2],[10,-2],[-10,-2],
  [2,10],[2,-10],[-2,10],[-2,-10],
  [22,4],[-22,4],[22,-4],[-22,-4],
  [4,22],[4,-22],[-4,22],[-4,-22],
  [26,10],[-26,10],[26,-10],[-26,-10],
  [10,26],[10,-26],[-10,26],[-10,-26],
];
treeSpots.forEach(([x,z]) => {
  const s = 0.6 + Math.random()*0.7;
  scene.add(makeChristmasTree(x,z,s));
});

// Central large tree
scene.add(makeChristmasTree(0, 0, 2.5));

// ═══════════════════════════════════════════════════════
//  SKILL STRUCTURES (beautiful buildings)

const structMeshes = [];
const structLights = [];

// Helper: colored mat
function mat(color, emissive=null, intensity=0.15) {
  return new THREE.MeshPhongMaterial({
    color, emissive: emissive||color, emissiveIntensity: intensity,
    shininess:40
  });
}
function wmat(c) { return new THREE.MeshLambertMaterial({color:c}); }

// ── TOWER (Node.js) ────────────────────────────────────
function buildTower(sk) {
  const g = new THREE.Group();
  const m = mat(sk.color, sk.glow, 0.2);
  const stone = wmat(0x3a4a3a);
  const winMat = new THREE.MeshBasicMaterial({color:sk.glow});

  // Base platform
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(2.4,2.7,0.5,12), wmat(0x556655)), {receiveShadow:true}));

  // Main body — 5 stories
  for (let i = 0; i < 5; i++) {
    const floor = new THREE.Mesh(new THREE.BoxGeometry(3-i*0.15, 1.1, 3-i*0.15), i%2===0 ? m : stone);
    floor.position.y = 0.8 + i*1.1; floor.castShadow=true; g.add(floor);
    // Windows
    [[1.52,0],[0,1.52],[-1.52,0],[0,-1.52]].forEach(([wx,wz]) => {
      const win = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.5,0.06), winMat);
      win.position.set(wx*(1-i*0.025), 0.8+i*1.1+0.1, wz*(1-i*0.025));
      if (wz !== 0) win.rotation.y = Math.PI/2;
      g.add(win);
    });
    // Floor ledge
    const ledge = new THREE.Mesh(new THREE.BoxGeometry(3.2-i*0.15,0.12,3.2-i*0.15), wmat(0x445544));
    ledge.position.y = 1.32+i*1.1; g.add(ledge);
  }

  // Battlements
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    const bat = new THREE.Mesh(new THREE.BoxGeometry(0.35,0.45,0.35), stone);
    bat.position.set(Math.cos(a)*1.2, 6.7, Math.sin(a)*1.2); g.add(bat);
  }

  // Spire
  const spire = new THREE.Mesh(new THREE.ConeGeometry(0.6,2.5,8), m);
  spire.position.y = 7.5; spire.castShadow=true; g.add(spire);

  // Flag
  const flagPole = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,1.8,6),
    new THREE.MeshBasicMaterial({color:0xcccccc}));
  flagPole.position.y = 9.5; g.add(flagPole);
  const flag = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.55,0.04),
    new THREE.MeshBasicMaterial({color:sk.glow}));
  flag.position.set(0.45,9.8,0); g.add(flag);

  // Christmas lights strung around
  for (let i = 0; i < 20; i++) {
    const a = (i/20)*Math.PI*2;
    const xL = new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),
      new THREE.MeshBasicMaterial({color:[0xff2020,0x20ff20,0x2080ff,0xffcc00][i%4]}));
    xL.position.set(Math.cos(a)*1.6, 2.0+Math.sin(a*3)*0.2, Math.sin(a)*1.6);
    g.add(xL);
  }

  return g;
}

// ── CATHEDRAL (HTML) ──────────────────────────────────
function buildCathedral(sk) {
  const g = new THREE.Group();
  const m = mat(sk.color, sk.glow, 0.25);
  const stone = wmat(0x4a3a3a);
  const winMat = new THREE.MeshBasicMaterial({color:sk.glow});
  const goldMat = new THREE.MeshBasicMaterial({color:0xffdd44});

  // Platform
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(6,0.4,5.5), wmat(0x5a4040)), {receiveShadow:true}));
  const platB = new THREE.Mesh(new THREE.BoxGeometry(5.5,0.3,5.0), wmat(0x6a5050)); platB.position.set(0,0.35,0); platB.receiveShadow=true; g.add(platB);

  // Nave (main body)
  const nave = new THREE.Mesh(new THREE.BoxGeometry(4,3.5,5), stone);
  nave.position.y = 2.15; nave.castShadow=true; g.add(nave);

  // Roof gable
  const roof = new THREE.Mesh(new THREE.CylinderGeometry(0.01,2.8,1.5,4), m);
  roof.position.y = 4.65; roof.rotation.y = Math.PI/4; g.add(roof);

  // Two bell towers
  [-1.8,1.8].forEach(tx => {
    const tower = new THREE.Mesh(new THREE.BoxGeometry(1.2,5.5,1.2), stone);
    tower.position.set(tx,3.15,2.2); tower.castShadow=true; g.add(tower);
    const spire = new THREE.Mesh(new THREE.ConeGeometry(0.9,2.2,8), m);
    spire.position.set(tx,6.8,2.2); spire.castShadow=true; g.add(spire);
    // Bell
    const bell = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,0.4,10),
      new THREE.MeshBasicMaterial({color:0xddaa22}));
    bell.position.set(tx,5.7,2.2); g.add(bell);
    // Cross
    const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.7,0.1), goldMat);
    crossV.position.set(tx,8.1,2.2); g.add(crossV);
    const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.1,0.1), goldMat);
    crossH.position.set(tx,7.95,2.2); g.add(crossH);
  });

  // Rose window
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    const petal = new THREE.Mesh(new THREE.CircleGeometry(0.3,8), winMat);
    petal.position.set(Math.cos(a)*0.65, 3.5, -2.52);
    petal.rotation.y = Math.PI; g.add(petal);
  }
  const centerWin = new THREE.Mesh(new THREE.CircleGeometry(0.3,10), winMat);
  centerWin.position.set(0,3.5,-2.52); centerWin.rotation.y = Math.PI; g.add(centerWin);

  // Arched windows on sides
  [-1,0,1].forEach(pos => {
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.9,0.08), winMat);
    win.position.set(-2.02, 2.4, pos*1.2); win.rotation.y = Math.PI/2; g.add(win);
    const win2 = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.9,0.08), winMat);
    win2.position.set(2.02, 2.4, pos*1.2); win2.rotation.y = Math.PI/2; g.add(win2);
  });

  // Door arch
  const door = new THREE.Mesh(new THREE.BoxGeometry(0.9,1.5,0.1), wmat(0x221111));
  door.position.set(0,1.15,-2.52); g.add(door);

  // Christmas wreath on door
  const wreath = new THREE.Mesh(new THREE.TorusGeometry(0.4,0.12,8,20),
    new THREE.MeshBasicMaterial({color:0x228822}));
  wreath.position.set(0,2.1,-2.56); g.add(wreath);

  return g;
}

// ── PALACE (CSS) ──────────────────────────────────────
function buildPalace(sk) {
  const g = new THREE.Group();
  const m = mat(sk.color, sk.glow, 0.3);
  const mLight = mat(0x4488ff, sk.glow, 0.15);
  const goldM = new THREE.MeshBasicMaterial({color:0xffdd44});
  const winMat = new THREE.MeshBasicMaterial({color:sk.glow});

  // Grand base
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(7,0.5,6), wmat(0x334466)), {receiveShadow:true}));
  const palB = new THREE.Mesh(new THREE.BoxGeometry(6.5,0.35,5.5), wmat(0x3a4d72)); palB.position.set(0,0.42,0); g.add(palB);

  // Steps
  [0,1,2].forEach(i => {
    const step = new THREE.Mesh(new THREE.BoxGeometry(4-i*0.6,0.2,0.5), wmat(0x3a4a6a));
    step.position.set(0,0.7+i*0.2,-2.5+i*0.5); g.add(step);
  });

  // Main building
  const main = new THREE.Mesh(new THREE.BoxGeometry(5,3.5,4.5), mLight);
  main.position.y = 2.5; main.castShadow=true; g.add(main);

  // Dome
  const dome = new THREE.Mesh(new THREE.SphereGeometry(1.6,16,12,0,Math.PI*2,0,Math.PI/2), m);
  dome.position.y = 4.25; dome.castShadow=true; g.add(dome);
  const domeRing = new THREE.Mesh(new THREE.CylinderGeometry(1.65,1.65,0.2,20), goldM);
  domeRing.position.y = 4.2; g.add(domeRing);
  // Dome spire
  const dSpire = new THREE.Mesh(new THREE.ConeGeometry(0.15,1,8), goldM);
  dSpire.position.y = 5.85; g.add(dSpire);
  // Dome star
  const dStar = new THREE.Mesh(new THREE.OctahedronGeometry(0.2,0), new THREE.MeshBasicMaterial({color:0xffee44}));
  dStar.position.y = 6.9; g.add(dStar);

  // Wing pillars
  [-2.8,2.8].forEach(wx => {
    for (let z = -1.5; z <= 1.5; z += 1.5) {
      const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.22,3.5,10), m);
      pillar.position.set(wx,2,z); pillar.castShadow=true; g.add(pillar);
    }
    // Wing roof
    const wRoof = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.25,3.8), goldM);
    wRoof.position.set(wx, 3.85, 0); g.add(wRoof);
  });

  // Windows with glow
  [[-1.5,2.5],[0,2.5],[1.5,2.5],[-1.5,1.2],[1.5,1.2]].forEach(([wx,wy]) => {
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.85,0.08), winMat);
    win.position.set(wx,wy,-2.27); g.add(win);
    const winB = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.85,0.08), winMat);
    winB.position.set(wx,wy,2.27); g.add(winB);
  });

  // Balcony
  const balcony = new THREE.Mesh(new THREE.BoxGeometry(3,0.15,0.8), goldM);
  balcony.position.set(0,2.2,-2.7); g.add(balcony);

  // Christmas garland
  for (let i = 0; i < 16; i++) {
    const a = (i/16)*Math.PI*2;
    const xL = new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),
      new THREE.MeshBasicMaterial({color:[0xff3333,0x33ff33,0x3399ff,0xffcc00][i%4]}));
    xL.position.set(Math.cos(a)*2.8, 1.0+Math.sin(a)*0.15, Math.sin(a)*2.3);
    g.add(xL);
  }

  return g;
}

// ── SKYSCRAPER (JS) ───────────────────────────────────
function buildSkyscraper(sk) {
  const g = new THREE.Group();
  const m = mat(sk.color, sk.glow, 0.2);
  const glass = new THREE.MeshPhongMaterial({
    color:0x223344, emissive:sk.glow, emissiveIntensity:0.08,
    transparent:true, opacity:0.85, shininess:120
  });
  const winMat = new THREE.MeshBasicMaterial({color:sk.glow});

  // Base plaza
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(5.5,0.4,5.5), wmat(0x334433)), {receiveShadow:true}));

  // Main tower — tapered
  const tower = new THREE.Mesh(new THREE.BoxGeometry(3.5,9,3.5), glass);
  tower.position.y = 5; tower.castShadow=true; g.add(tower);

  // Floor bands
  for (let i = 0; i < 9; i++) {
    const band = new THREE.Mesh(new THREE.BoxGeometry(3.7,0.12,3.7), m);
    band.position.y = 0.7+i*1.0; g.add(band);
    // Windows per floor
    for (let w = 0; w < 4; w++) {
      const a = (w/4)*Math.PI*2+Math.PI/4;
      const win = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.7,0.06), winMat);
      win.position.set(Math.cos(a)*1.76, 1.2+i*1.0, Math.sin(a)*1.76);
      win.rotation.y = a; g.add(win);
    }
  }

  // Antenna with Christmas star
  const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.08,3,8), wmat(0xaaaaaa));
  ant.position.y = 10.5; g.add(ant);
  const star = new THREE.Mesh(new THREE.OctahedronGeometry(0.35,0), new THREE.MeshBasicMaterial({color:0xffee00}));
  star.position.y = 12.2; star.userData.spin = true; g.add(star);
  const antLight = new THREE.PointLight(0xffee44,1,5);
  antLight.position.y = 12.2; g.add(antLight);

  // Side wing buildings
  [-2.3,2.3].forEach(wx => {
    const wing = new THREE.Mesh(new THREE.BoxGeometry(1.2,5.5,1.8), glass);
    wing.position.set(wx, 3.15, 0); wing.castShadow=true; g.add(wing);
    const wRoof = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.2,2), m);
    wRoof.position.set(wx, 5.7, 0); g.add(wRoof);
  });

  return g;
}

// ── SHRINE (Spring Boot) ──────────────────────────────
function buildShrine(sk) {
  const g = new THREE.Group();
  const m = mat(sk.color, sk.glow, 0.3);
  const wood = wmat(0x5c3d1e);
  const redMat = wmat(0xcc2222);
  const goldMat = new THREE.MeshBasicMaterial({color:0xffdd44});
  const winMat = new THREE.MeshBasicMaterial({color:sk.glow});

  // Stone platform
  const plat1 = new THREE.Mesh(new THREE.BoxGeometry(7,0.4,7), wmat(0x4a5a4a));
  plat1.receiveShadow = true; g.add(plat1);
  const plat2 = new THREE.Mesh(new THREE.BoxGeometry(5.5,0.4,5.5), wmat(0x556655));
  plat2.position.y = 0.4; plat2.receiveShadow = true; g.add(plat2);
  const plat3 = new THREE.Mesh(new THREE.BoxGeometry(4.2,0.4,4.2), wmat(0x607060));
  plat3.position.y = 0.8; plat3.receiveShadow = true; g.add(plat3);

  // Steps around
  [0,1,2,3].forEach(side => {
    const a = side*Math.PI/2;
    for (let s = 0; s < 3; s++) {
      const step = new THREE.Mesh(new THREE.BoxGeometry(2,0.18,0.35), wmat(0x4a5a4a));
      step.position.set(
        Math.sin(a)*(2.5-s*0.4), 0.1+s*0.18, Math.cos(a)*(2.5-s*0.4)
      );
      step.rotation.y = a; g.add(step);
    }
  });

  // Main hall
  const hall = new THREE.Mesh(new THREE.BoxGeometry(3.2,3,3.2), wood);
  hall.position.y = 2.7; hall.castShadow=true; g.add(hall);

  // Curved roof (layered)
  const roofLayers = [
    {w:4.5,d:4.5,y:4.5,h:0.25},
    {w:4.0,d:4.0,y:4.2,h:0.18},
  ];
  roofLayers.forEach(r => {
    const roof = new THREE.Mesh(new THREE.BoxGeometry(r.w,r.h,r.d), redMat);
    roof.position.y = r.y; roof.castShadow=true; g.add(roof);
  });
  // Main roof cone
  const mainRoof = new THREE.Mesh(new THREE.CylinderGeometry(0.1,2.6,1.5,4), redMat);
  mainRoof.position.y = 5.0; mainRoof.rotation.y = Math.PI/4; g.add(mainRoof);
  // Roof trim
  const trim = new THREE.Mesh(new THREE.TorusGeometry(2.1,0.1,8,20), goldMat);
  trim.position.y = 4.55; trim.rotation.x = Math.PI/2; g.add(trim);

  // Corner turrets
  [[1.4,1.4],[1.4,-1.4],[-1.4,1.4],[-1.4,-1.4]].forEach(([tx,tz]) => {
    const tur = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.35,4,8), wood);
    tur.position.set(tx,2.8,tz); tur.castShadow=true; g.add(tur);
    const turRoof = new THREE.Mesh(new THREE.ConeGeometry(0.42,0.8,8), redMat);
    turRoof.position.set(tx,5.2,tz); g.add(turRoof);
    const turTip = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.5,6), goldMat);
    turTip.position.set(tx,5.85,tz); g.add(turTip);
  });

  // Gate
  const gate = new THREE.Mesh(new THREE.BoxGeometry(1.2,0.12,3.5), redMat);
  gate.position.set(0,3.95,0); gate.rotation.y = 0; g.add(gate);
  const gatePost1 = new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.16,4.3,8), wood);
  gatePost1.position.set(-0.7,3.35,3.4); g.add(gatePost1);
  const gatePost2 = gatePost1.clone(); gatePost2.position.x = 0.7; g.add(gatePost2);
  const gateTop = new THREE.Mesh(new THREE.BoxGeometry(1.8,0.18,0.18), redMat);
  gateTop.position.set(0,5.5,3.4); g.add(gateTop);

  // Windows
  [[0,2.5,-1.61],[1.61,2.5,0],[-1.61,2.5,0]].forEach(([wx,wy,wz]) => {
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.8,0.08), winMat);
    win.position.set(wx,wy,wz);
    if (wz===0) win.rotation.y = Math.PI/2; g.add(win);
  });

  // Lanterns
  [[1.4,0],[1.4,0],[-1.4,0]].forEach(([lx],i) => {
    const ls = [-1.4,0,1.4];
    const lz = ls[i];
    const lantern = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.35,0.25),
      new THREE.MeshBasicMaterial({color:0xffaa22}));
    lantern.position.set(lx, 3.6, lz);
    const lLight = new THREE.PointLight(0xffaa22,0.5,3);
    lLight.position.set(lx,3.6,lz); g.add(lLight);
    g.add(lantern);
  });

  // Giant Christmas wreath
  const wreath = new THREE.Mesh(new THREE.TorusGeometry(0.55,0.15,8,20),
    new THREE.MeshBasicMaterial({color:0x226622}));
  wreath.position.set(0,2.5,-1.63); g.add(wreath);
  // Bow
  const bow = new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),
    new THREE.MeshBasicMaterial({color:0xff2222}));
  bow.position.set(0.15,2.2,-1.64); g.add(bow);

  return g;
}

// Build and place structures
const builders2 = {tower:buildTower, cathedral:buildCathedral, palace:buildPalace, skyscraper:buildSkyscraper, shrine:buildShrine};

SKILLS.forEach(sk => {
  const struct = builders2[sk.type](sk);
  struct.position.set(sk.pos.x, 1.2, sk.pos.z);
  struct.userData.skill = sk;
  scene.add(struct);
  structMeshes.push(struct);

  // Platform glow ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(3.0,0.07,8,36),
    new THREE.MeshBasicMaterial({color:sk.glow})
  );
  ring.position.set(sk.pos.x, 1.26, sk.pos.z);
  ring.rotation.x = Math.PI/2; ring.userData.glowRing = true;
  scene.add(ring);

  // Point light
  const ptLight = new THREE.PointLight(sk.glow, 2, 14);
  ptLight.position.set(sk.pos.x, 5, sk.pos.z);
  scene.add(ptLight);
  structLights.push({light:ptLight, base:2});

  // Spotlights from below
  const spot = new THREE.SpotLight(sk.glow, 1.5, 20, Math.PI/8, 0.4);
  spot.position.set(sk.pos.x, 0.5, sk.pos.z);
  spot.target.position.set(sk.pos.x, 8, sk.pos.z);
  scene.add(spot); scene.add(spot.target);
});

//  PLAYER
// ═══════════════════════════════════════════════════════
function makePlayer() {
  const g = new THREE.Group();
  const bodyMat = wmat(0x2244bb);
  const skinMat = wmat(0xf0c880);
  const darkMat = wmat(0x223344);
  const redMat2 = wmat(0xcc2222);

  // Legs
  [-0.13,0.13].forEach((lx,i) => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.45,0.22), darkMat);
    leg.position.set(lx,0.24,0); leg.userData.isLeg=true; leg.userData.idx=i;
    leg.castShadow=true; g.add(leg);
    // Boot
    const boot = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.16,0.3), wmat(0x111111));
    boot.position.set(lx,0.02,0.04); g.add(boot);
  });

  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.52,0.65,0.32), bodyMat);
  body.position.y = 0.75; body.castShadow=true; g.add(body);

  // Belt
  const belt = new THREE.Mesh(new THREE.BoxGeometry(0.54,0.1,0.34), wmat(0x111111));
  belt.position.y = 0.49; g.add(belt);
  const buckle = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.08,0.35), new THREE.MeshBasicMaterial({color:0xffcc00}));
  buckle.position.y = 0.49; g.add(buckle);

  // Arms
  [-0.36,0.36].forEach((ax,i) => {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.48,0.2), bodyMat);
    arm.position.set(ax,0.76,0); arm.userData.isArm=true; arm.userData.side=ax<0?'l':'r';
    arm.castShadow=true; g.add(arm);
    // Hand
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8), skinMat);
    hand.position.set(ax,0.52,0); g.add(hand);
  });

  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.12,0.2,8), skinMat); neck.position.set(0,1.13,0); g.add(neck);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4), skinMat);
  head.position.y = 1.42; head.castShadow=true; g.add(head);

  // Eyes
  [-0.1,0.1].forEach(ex => {
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.07,0.05), wmat(0x111133));
    eye.position.set(ex,1.46,0.21); g.add(eye);
    // Eye shine
    const shine = new THREE.Mesh(new THREE.BoxGeometry(0.025,0.025,0.04), new THREE.MeshBasicMaterial({color:0xffffff}));
    shine.position.set(ex+0.02,1.48,0.23); g.add(shine);
  });
  // Smile
  const smile = new THREE.Mesh(new THREE.BoxGeometry(0.16,0.04,0.04), wmat(0x553322));
  smile.position.set(0,1.37,0.21); g.add(smile);

  // Christmas hat
  const hatBrim = new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.35,0.08,10), redMat2);
  hatBrim.position.y = 1.65; g.add(hatBrim);
  const hatBody = new THREE.Mesh(new THREE.ConeGeometry(0.28,0.55,10), redMat2);
  hatBody.position.y = 1.97; g.add(hatBody);
  const pompom = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8), wmat(0xffffff));
  pompom.position.y = 2.27; g.add(pompom);
  // Hat trim
  const hatTrim = new THREE.Mesh(new THREE.CylinderGeometry(0.31,0.33,0.14,12), wmat(0xffffff));
  hatTrim.position.y = 1.67; g.add(hatTrim);

  // Scarf
  const scarf = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,0.18,10), wmat(0xff4444));
  scarf.position.y = 1.12; g.add(scarf);
  const scarfTail = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.4,0.1), wmat(0xff4444));
  scarfTail.position.set(0.1,0.9,0.18); scarfTail.rotation.z = 0.2; g.add(scarfTail);

  return g;
}

const player = makePlayer();
player.position.set(0, 1.3, 5);
scene.add(player);

// Player shadow
const shadowCircle = new THREE.Mesh(
  new THREE.CircleGeometry(0.35,12),
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.35})
);
shadowCircle.rotation.x = -Math.PI/2;
scene.add(shadowCircle);

// ═══════════════════════════════════════════════════════
//  SNOWFALL (2D canvas overlay)
// ═══════════════════════════════════════════════════════
const snowCanvas = document.getElementById('snow-canvas');
snowCanvas.width = window.innerWidth;
snowCanvas.height = window.innerHeight;
const snowCtx = snowCanvas.getContext('2d');
const snowflakes = Array.from({length:200},() => ({
  x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
  r:1+Math.random()*2.5, speed:0.5+Math.random()*1.5,
  drift:(Math.random()-0.5)*0.5, opacity:0.3+Math.random()*0.5
}));

function drawSnow() {
  snowCtx.clearRect(0,0,snowCanvas.width,snowCanvas.height);
  snowflakes.forEach(s => {
    snowCtx.beginPath();
    snowCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    snowCtx.fillStyle = `rgba(255,255,255,${s.opacity})`;
    snowCtx.fill();
    s.y += s.speed; s.x += s.drift;
    if (s.y > snowCanvas.height) { s.y = -5; s.x = Math.random()*snowCanvas.width; }
    if (s.x > snowCanvas.width) s.x = 0;
    if (s.x < 0) s.x = snowCanvas.width;
  });
}

// ═══════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════
const mmCtx = document.getElementById('minimap').getContext('2d');
function drawMinimap() {
  const W=120,H=120,cx=60,cy=60,sc=2.0;
  mmCtx.clearRect(0,0,W,H);
  // BG
  mmCtx.beginPath(); mmCtx.arc(cx,cy,58,0,Math.PI*2);
  mmCtx.fillStyle='rgba(2,8,20,0.85)'; mmCtx.fill();
  // Island
  mmCtx.beginPath(); mmCtx.arc(cx,cy,47,0,Math.PI*2);
  mmCtx.fillStyle='#c8d8e8'; mmCtx.fill();
  // Road cross
  mmCtx.strokeStyle='rgba(100,130,160,0.7)'; mmCtx.lineWidth=3;
  mmCtx.beginPath(); mmCtx.moveTo(cx-47,cy); mmCtx.lineTo(cx+47,cy); mmCtx.stroke();
  mmCtx.beginPath(); mmCtx.moveTo(cx,cy-47); mmCtx.lineTo(cx,cy+47); mmCtx.stroke();
  // Skills
  SKILLS.forEach(sk => {
    const mx=cx+sk.pos.x*sc, my=cy+sk.pos.z*sc;
    mmCtx.beginPath(); mmCtx.arc(mx,my,5,0,Math.PI*2);
    mmCtx.fillStyle='#'+sk.color.toString(16).padStart(6,'0'); mmCtx.fill();
    mmCtx.strokeStyle='rgba(255,255,255,0.4)'; mmCtx.lineWidth=1; mmCtx.stroke();
  });
  // Player
  const px=cx+player.position.x*sc, py=cy+player.position.z*sc;
  mmCtx.beginPath(); mmCtx.arc(px,py,4,0,Math.PI*2);
  mmCtx.fillStyle='#ffffff'; mmCtx.fill();
  mmCtx.beginPath(); mmCtx.arc(px,py,5,0,Math.PI*2);
  mmCtx.strokeStyle='#00ffbb'; mmCtx.lineWidth=1.5; mmCtx.stroke();
  // Border
  mmCtx.beginPath(); mmCtx.arc(cx,cy,58,0,Math.PI*2);
  mmCtx.strokeStyle='rgba(80,200,255,0.3)'; mmCtx.lineWidth=2; mmCtx.stroke();
}

// ═══════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════
const keys = {};
let yaw = 0, pitch = 0.38, locked = false;
let nearSkill = null, modalOpen = false;
let walkT = 0;

document.addEventListener('keydown', e => { keys[e.code]=true; });
document.addEventListener('keyup',   e => { keys[e.code]=false; });

canvas.addEventListener('click', () => { if(!modalOpen) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => { locked = !!document.pointerLockElement; });
document.addEventListener('mousemove', e => {
  if(!locked) return;
  yaw -= e.movementX*0.003;
  pitch = Math.max(0.08, Math.min(0.85, pitch - e.movementY*0.003));
});

document.addEventListener('keydown', e => {
  if(e.code==='KeyE' && nearSkill && !modalOpen) openModal(nearSkill);
  if(e.code==='Escape' && modalOpen) closeModal();
});

// Custom cursor
const cur = document.getElementById('custom-cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px';
});

function openModal(sk) {
  modalOpen = true;
  if(document.pointerLockElement) document.exitPointerLock();
  document.getElementById('m-icon').textContent = sk.icon;
  document.getElementById('m-name').textContent = sk.name;
  document.getElementById('m-name').style.color = sk.hex;
  document.getElementById('m-level').textContent = 'Nível: '+sk.level;
  document.getElementById('m-desc').textContent = sk.desc;
  document.getElementById('m-bar').style.width='0%';
  document.getElementById('m-bar').style.background = `linear-gradient(90deg, ${sk.hex}, ${sk.hex}aa)`;
  const tags = document.getElementById('m-tags');
  tags.innerHTML='';
  sk.tags.forEach(t => {
    const s=document.createElement('span'); s.className='m-tag';
    s.style.borderColor=sk.hex+'55'; s.style.color=sk.hex; s.textContent=t;
    tags.appendChild(s);
  });
  const md = document.getElementById('modal');
  md.style.display='block';
  requestAnimationFrame(() => {
    md.classList.add('show');
    setTimeout(()=>{ document.getElementById('m-bar').style.width=sk.pct+'%'; },120);
  });
}

window.closeModal = function() {
  document.getElementById('modal').classList.remove('show');
  setTimeout(()=>{ document.getElementById('modal').style.display='none'; },400);
  modalOpen = false;
};

// ═══════════════════════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════════════════════
let lp=0;
const lbar=document.getElementById('load-bar');
const lel=document.getElementById('loading');
function doLoad() {
  lp += 8+Math.random()*14;
  if(lp>=100){ lp=100; lbar.style.width='100%';
    setTimeout(()=>{ lel.style.opacity='0'; setTimeout(()=>lel.style.display='none',900); },400);
    return; }
  lbar.style.width=lp+'%';
  setTimeout(doLoad, 80+Math.random()*120);
}
doLoad();

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
const clock = new THREE.Clock();
let time = 0;
const ISLAND_R = 30;
const WALK_SPD = 5, RUN_SPD = 10;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  time += dt;

  if(!modalOpen) {
    const run = keys['ShiftLeft']||keys['ShiftRight'];
    const spd = (run ? RUN_SPD : WALK_SPD)*dt;
    const fwd = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const rgt = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    const dir = new THREE.Vector3();
    let moved = false;
    if(keys['KeyW']||keys['ArrowUp'])   { dir.add(fwd); moved=true; }
    if(keys['KeyS']||keys['ArrowDown']) { dir.sub(fwd); moved=true; }
    if(keys['KeyA']||keys['ArrowLeft']) { dir.sub(rgt); moved=true; }
    if(keys['KeyD']||keys['ArrowRight']){ dir.add(rgt); moved=true; }
    if(moved) {
      dir.normalize();
      const nx = player.position.x + dir.x*spd;
      const nz = player.position.z + dir.z*spd;
      if(Math.sqrt(nx*nx+nz*nz) < ISLAND_R) {
        player.position.x = nx; player.position.z = nz;
      }
      player.rotation.y = Math.atan2(dir.x, dir.z);
      walkT += (run?14:9)*dt;
      player.children.forEach(c => {
        if(c.userData.isLeg) c.rotation.x = Math.sin(walkT+c.userData.idx*Math.PI)*0.55;
        if(c.userData.isArm) c.rotation.x = Math.sin(walkT+(c.userData.side==='l'?0:Math.PI))*0.45;
      });
    } else {
      player.children.forEach(c => {
        if(c.userData.isLeg||c.userData.isArm) c.rotation.x *= 0.8;
      });
    }
  }

  // Shadow follow
  shadowCircle.position.set(player.position.x, 1.24, player.position.z);

  // Camera
  const cd=10, ch=cd*Math.sin(pitch), cH=cd*Math.cos(pitch);
  const tp = new THREE.Vector3(
    player.position.x+Math.sin(yaw)*cH, player.position.y+ch+1.2,
    player.position.z+Math.cos(yaw)*cH
  );
  camera.position.lerp(tp,0.12);
  camera.lookAt(player.position.x, player.position.y+1.0, player.position.z);

  // Proximity check
  let best=null, bestD=Infinity;
  structMeshes.forEach(s => {
    const dx=player.position.x-s.position.x, dz=player.position.z-s.position.z;
    const d=Math.sqrt(dx*dx+dz*dz);
    if(d<6 && d<bestD){ bestD=d; best=s.userData.skill; }
  });
  nearSkill = best;
  const prx = document.getElementById('proximity');
  if(best && !modalOpen){
    prx.classList.add('show');
    document.getElementById('prox-text').textContent = 'Explorar: '+best.name;
    document.getElementById('hud-area').textContent = best.name;
    document.getElementById('hud-area').style.color = best.hex;
  } else {
    prx.classList.remove('show');
    document.getElementById('hud-area').textContent = 'Explorando...';
    document.getElementById('hud-area').style.color = 'rgba(255,255,255,0.5)';
  }

  // Animate ocean
  for(let i=0;i<oceanPos.count;i++){
    const x=oceanPos.getX(i), z=oceanPos.getZ(i);
    oceanPos.setY(i, oceanOrigY[i] + Math.sin(time*1.1+x*0.08)*0.25 + Math.cos(time*0.7+z*0.1)*0.18);
  }
  oceanPos.needsUpdate=true;

  // Animate skill lights
  structLights.forEach((sl,i) => {
    sl.light.intensity = sl.base + Math.sin(time*2+i*1.3)*0.6;
  });

  // Spin JS skyscraper star
  scene.traverse(obj => {
    if(obj.userData.spin) obj.rotation.y = time*2;
  });

  // Glow rings pulse
  scene.traverse(obj => {
    if(obj.userData.glowRing) {
      obj.scale.x = obj.scale.z = 1+Math.sin(time*3)*0.05;
    }
  });

  // Twinkle lamps
  island.traverse && island.traverse(obj => {
    if(obj.isLight && obj.intensity !== undefined && obj.distance < 8) {
      obj.intensity = 0.8 + Math.sin(time*4+obj.position.x)*0.1;
    }
  });

  drawSnow();
  drawMinimap();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  snowCanvas.width=innerWidth; snowCanvas.height=innerHeight;
});
</script>
