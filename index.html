<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Realm | 3D Portfolio Adventure</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Arial', sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 40px;
            box-sizing: border-box;
            text-shadow: 0 0 20px rgba(0,0,0,0.7);
        }

        .header {
            border-left: 5px solid #f89820;
            padding-left: 20px;
            background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(3px);
            width: fit-content;
            padding: 15px 30px 15px 25px;
            border-radius: 0 30px 30px 0;
            margin-left: -40px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #f89820;
            text-shadow: 0 0 20px #f89820, 0 0 40px #f60;
        }
        
        .header p {
            margin: 5px 0 0;
            font-size: 1.2rem;
            color: #ddd;
        }

        .controls-panel {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(248, 152, 32, 0.4);
            border-radius: 50px;
            padding: 12px 25px;
            width: fit-content;
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        
        .controls-panel b { color: #f89820; }

        #info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.97);
            border: 2px solid #f89820;
            border-radius: 40px;
            padding: 40px 50px;
            max-width: 480px;
            width: 90%;
            pointer-events: all;
            display: none;
            box-shadow: 0 0 80px rgba(248, 152, 32, 0.6);
            backdrop-filter: blur(15px);
            color: #eee;
            text-align: center;
            animation: cardGlow 2s infinite alternate;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 0 40px rgba(248,152,32,0.5); }
            100% { box-shadow: 0 0 90px rgba(248,152,32,0.9); }
        }

        #info-card h2 {
            color: #f89820;
            font-size: 2.5rem;
            margin: 0 0 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #info-card p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-close {
            background: transparent;
            border: 2px solid #f89820;
            color: #f89820;
            padding: 12px 30px;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(248,152,32,0.3);
        }
        
        .btn-close:hover {
            background: #f89820;
            color: #111;
            transform: scale(1.07);
            box-shadow: 0 0 40px #f89820;
        }

        .active { display: block !important; }

        #objective-counter {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #f89820;
            font-size: 1.3rem;
            font-weight: bold;
            color: #f89820;
            box-shadow: 0 0 30px rgba(248,152,32,0.3);
            pointer-events: none;
        }

        #collectible-counter {
            position: absolute;
            bottom: 100px;
            right: 40px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #00ffff;
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ffff;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
            pointer-events: none;
        }

        #message-toast {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(248,152,32,0.9);
            color: #111;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 0 30px #f89820;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="header">
            <h1>⚡ JAVA REALM</h1>
            <p>fullstack • cloud • architecture</p>
        </div>
        <div class="controls-panel">
            <b>✦ W A S D</b> para explorar | <b style="color:#00ffff">✦ Colete cubos de código</b>
        </div>
    </div>

    <div id="objective-counter">
        🎯 Skills desbloqueadas: <span id="skills-collected">0</span>/5
    </div>

    <div id="collectible-counter">
        💎 Cubos de código: <span id="cubes-collected">0</span>/8
    </div>

    <div id="message-toast">
        ⚡ Mensagem
    </div>

    <div id="info-card">
        <h2 id="title">Título</h2>
        <p id="desc">Descrição detalhada da tecnologia ou projeto.</p>
        <button class="btn-close" onclick="closeInfo()">CONTINUAR JORNADA</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CENA E RENDER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);
        scene.fog = new THREE.Fog(0x0a0a14, 15, 60);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 18);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- LUZES ---
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);

        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        mainLight.position.set(5, 20, 10);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        const d = 25;
        mainLight.shadow.camera.left = -d;
        mainLight.shadow.camera.right = d;
        mainLight.shadow.camera.top = d;
        mainLight.shadow.camera.bottom = -d;
        mainLight.shadow.camera.near = 1;
        mainLight.shadow.camera.far = 50;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x4466ff, 0.8);
        fillLight.position.set(-5, 5, 10);
        scene.add(fillLight);

        // --- CHÃO ---
        const groundGeo = new THREE.CircleGeometry(40, 32);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e, 
            roughness: 0.4, 
            metalness: 0.1,
            emissive: 0x050510
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(60, 40, 0xf89820, 0x335588);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- JOGADOR ---
        const playerGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const playerMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            emissive: 0x00aaff,
            emissiveIntensity: 1.8
        });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 0.7;
        player.castShadow = true;
        player.receiveShadow = true;
        scene.add(player);

        // Partículas ao redor do jogador
        const particleCount = 8;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            particlePositions[i*3] = Math.cos(angle) * 1.2;
            particlePositions[i*3+1] = 0.2;
            particlePositions[i*3+2] = Math.sin(angle) * 1.2;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88ccff, size: 0.1, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        player.add(particles);

        // --- CARREGADOR DE TEXTURAS ---
        const loader = new THREE.TextureLoader();
        
        // Dados das tecnologias com logos oficiais
        const markersData = [
            { x: 6, z: -12, title: "JAVA", desc: "Especialista em Java 17/21, Collections, Streams, Multithreading e otimização de performance.", logoUrl: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg' },
            { x: -7, z: -18, title: "CSS3", desc: "Flexbox, Grid, animações e design responsivo com pré-processadores e variáveis.", logoUrl: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg' },
            { x: 9, z: -22, title: "HTML5", desc: "Semântica, acessibilidade e estruturação avançada para SEO e aplicações modernas.", logoUrl: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg' },
            { x: -5, z: -8, title: "NODE.JS", desc: "APIs escaláveis com Express, integração com bancos NoSQL e arquitetura de microsserviços.", logoUrl: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg' },
            { x: 2, z: -28, title: "SPRING BOOT", desc: "Microsserviços robustos, segurança com JWT, Spring Data JPA e Cloud.", logoUrl: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/spring/spring-original.svg' }
        ];

        const markerMeshes = [];
        let skillsCollected = 0;
        let cubesCollected = 0;

        // Função para criar material com textura
        function createLogoMaterial(logoUrl, fallbackColor) {
            return new Promise((resolve) => {
                loader.load(logoUrl, 
                    (texture) => {
                        const material = new THREE.MeshStandardMaterial({ 
                            map: texture,
                            emissive: 0x222222,
                            side: THREE.DoubleSide,
                            transparent: true
                        });
                        resolve(material);
                    },
                    undefined,
                    (error) => {
                        console.warn(`Erro ao carregar ${logoUrl}, usando fallback colorido.`);
                        const material = new THREE.MeshStandardMaterial({ 
                            color: fallbackColor,
                            emissive: 0x222222,
                            side: THREE.DoubleSide
                        });
                        resolve(material);
                    }
                );
            });
        }

        const fallbackColors = [0xf89820, 0x264de4, 0xe34c26, 0x68a063, 0x6db33f];

        // Criar todos os totens
        await Promise.all(markersData.map(async (data, index) => {
            const material = await createLogoMaterial(data.logoUrl, fallbackColors[index]);
            
            const geom = new THREE.BoxGeometry(2.8, 3.2, 0.6);
            const mesh = new THREE.Mesh(geom, material);
            mesh.position.set(data.x, 1.8, data.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            const edges = new THREE.EdgesGeometry(geom);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xf89820 }));
            mesh.add(line);
            
            mesh.userData = data;
            scene.add(mesh);
            markerMeshes.push(mesh);

            const pointLight = new THREE.PointLight(0xf89820, 1.5, 15);
            pointLight.position.set(data.x, 3.5, data.z);
            scene.add(pointLight);
        }));

        // --- NOVOS ELEMENTOS INTERATIVOS ---

        // 1. CUBOS COLECIONÁVEIS (Códigos)
        const collectibles = [];
        const collectiblePositions = [
            { x: 3, z: -5 }, { x: -4, z: -10 }, { x: 8, z: -15 }, { x: -6, z: -22 },
            { x: 12, z: -18 }, { x: -10, z: -25 }, { x: 4, z: -30 }, { x: -3, z: -12 }
        ];

        collectiblePositions.forEach((pos, i) => {
            const geom = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00ffff,
                emissive: 0x0088aa,
                emissiveIntensity: 2
            });
            const cube = new THREE.Mesh(geom, mat);
            cube.position.set(pos.x, 0.5, pos.z);
            cube.castShadow = true;
            cube.receiveShadow = true;
            
            // Adiciona rotação inicial
            cube.userData = { id: i, collected: false, floatOffset: Math.random() * 100 };
            scene.add(cube);
            collectibles.push(cube);
        });

        // 2. ÁRVORES DE CONHECIMENTO (Decoração interativa)
        const treePositions = [
            { x: 15, z: -5 }, { x: -15, z: -10 }, { x: 12, z: -30 }, { x: -12, z: -25 }
        ];

        treePositions.forEach(pos => {
            // Tronco
            const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 2);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(pos.x, 1, pos.z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);

            // Copa (várias esferas verdes)
            for (let i = 0; i < 5; i++) {
                const leafGeo = new THREE.SphereGeometry(0.8, 8);
                const leafMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71, emissive: 0x0a3300 });
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.set(
                    pos.x + (Math.random() - 0.5) * 1.5,
                    2.2 + Math.random() * 1.2,
                    pos.z + (Math.random() - 0.5) * 1.5
                );
                leaf.castShadow = true;
                leaf.receiveShadow = true;
                scene.add(leaf);
            }
        });

        // 3. PORTAL MISTERIOSO (no centro)
        const portalBaseGeo = new THREE.CylinderGeometry(2, 2, 0.5, 32);
        const portalBaseMat = new THREE.MeshStandardMaterial({ color: 0x333333, emissive: 0x111122 });
        const portalBase = new THREE.Mesh(portalBaseGeo, portalBaseMat);
        portalBase.position.set(0, 0.25, -35);
        portalBase.receiveShadow = true;
        scene.add(portalBase);

        const portalRingGeo = new THREE.TorusGeometry(1.5, 0.2, 16, 64);
        const portalRingMat = new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0x440022 });
        const portalRing = new THREE.Mesh(portalRingGeo, portalRingMat);
        portalRing.rotation.x = Math.PI / 2;
        portalRing.position.set(0, 1.2, -35);
        portalRing.castShadow = true;
        scene.add(portalRing);

        // 4. PLACAS DE INFORMAÇÃO
        const signData = [
            { x: -20, z: 0, text: "ÁREA DE\nTESTES" },
            { x: 20, z: -20, text: "CAVERNA\nDOS DADOS" }
        ];

        signData.forEach(sign => {
            const postGeo = new THREE.CylinderGeometry(0.2, 0.2, 2);
            const postMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
            const post = new THREE.Mesh(postGeo, postMat);
            post.position.set(sign.x, 1, sign.z);
            post.castShadow = true;
            post.receiveShadow = true;
            scene.add(post);

            const boardGeo = new THREE.BoxGeometry(2, 1, 0.2);
            const boardMat = new THREE.MeshStandardMaterial({ color: 0xf89820, emissive: 0x331100 });
            const board = new THREE.Mesh(boardGeo, boardMat);
            board.position.set(sign.x, 2.2, sign.z);
            board.castShadow = true;
            board.receiveShadow = true;
            
            // Adiciona texto simulado com cubinhos (representação)
            for (let i = 0; i < 3; i++) {
                const dotGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
                const dotMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.set(sign.x - 0.5 + i * 0.5, 2.2, sign.z + 0.11);
                scene.add(dot);
            }
            
            scene.add(board);
        });

        // --- EFEITO ESTRELAS ---
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 400;
        const starsPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPos[i*3] = (Math.random() - 0.5) * 200;
            starsPos[i*3+1] = (Math.random() - 0.5) * 100;
            starsPos[i*3+2] = (Math.random() - 0.5) * 200 - 100;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.3, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- MOVIMENTO E INTERAÇÃO ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { const k = e.key.toLowerCase(); if (['w','a','s','d'].includes(k)) keys[k] = true; });
        window.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if (['w','a','s','d'].includes(k)) keys[k] = false; });

        const infoCard = document.getElementById('info-card');
        let cardOpen = false;
        let currentTarget = null;
        let messageTimeout = null;

        function showMessage(msg) {
            const toast = document.getElementById('message-toast');
            toast.style.opacity = 1;
            toast.innerHTML = msg;
            
            if (messageTimeout) clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                toast.style.opacity = 0;
            }, 2000);
        }

        window.showInfo = (data) => {
            document.getElementById('title').innerText = data.title;
            document.getElementById('desc').innerText = data.desc;
            infoCard.classList.add('active');
            cardOpen = true;
            
            // Incrementa contador de skills (apenas se não foi coletada antes)
            if (!data.collected) {
                data.collected = true;
                skillsCollected++;
                document.getElementById('skills-collected').innerText = skillsCollected;
                showMessage(`✨ Skill desbloqueada: ${data.title}`);
                
                // Verifica se todas as skills foram coletadas
                if (skillsCollected === markerMeshes.length) {
                    showMessage("🎉 PARABÉNS! Todas as skills foram desbloqueadas!");
                }
            }
        };

        window.closeInfo = () => {
            infoCard.classList.remove('active');
            cardOpen = false;
            if (currentTarget) {
                const dir = player.position.clone().sub(currentTarget.position).normalize();
                player.position.add(dir.multiplyScalar(2.5));
                currentTarget = null;
            }
        };

        // Loop de animação
        function animate() {
            requestAnimationFrame(animate);

            if (!cardOpen) {
                const speed = 0.18;
                if (keys.w) player.position.z -= speed;
                if (keys.s) player.position.z += speed;
                if (keys.a) player.position.x -= speed;
                if (keys.d) player.position.x += speed;

                player.position.x = Math.max(-25, Math.min(25, player.position.x));
                player.position.z = Math.max(-38, Math.min(10, player.position.z));
            }

            const targetCamPos = new THREE.Vector3(
                player.position.x,
                player.position.y + 7.5,
                player.position.z + 13
            );
            camera.position.lerp(targetCamPos, 0.08);
            camera.lookAt(player.position);

            // Detecção de proximidade para totens
            let closestDist = 6;
            let closestMesh = null;
            markerMeshes.forEach(m => {
                const dist = player.position.distanceTo(m.position);
                if (dist < 4.5 && dist < closestDist && !cardOpen) {
                    closestDist = dist;
                    closestMesh = m;
                }
            });

            if (closestMesh && !cardOpen) {
                currentTarget = closestMesh;
                showInfo(closestMesh.userData);
            }

            // Detecção de coleta dos cubos
            collectibles.forEach(cube => {
                if (!cube.userData.collected) {
                    const dist = player.position.distanceTo(cube.position);
                    if (dist < 2) {
                        cube.userData.collected = true;
                        scene.remove(cube);
                        cubesCollected++;
                        document.getElementById('cubes-collected').innerText = cubesCollected;
                        showMessage(`💾 Código coletado! (${cubesCollected}/8)`);
                        
                        if (cubesCollected === collectibles.length) {
                            showMessage("🌟 VOCÊ COLETOU TODOS OS CÓDIGOS! Acesso liberado!");
                        }
                    }
                }
            });

            // Animações
            markerMeshes.forEach((m, i) => {
                m.rotation.y += 0.005;
                m.position.y = 1.8 + Math.sin(Date.now() * 0.0025 + i) * 0.3;
            });

            collectibles.forEach((cube, i) => {
                cube.rotation.x += 0.02;
                cube.rotation.y += 0.03;
                cube.position.y = 0.5 + Math.sin(Date.now() * 0.003 + i) * 0.2;
            });

            // Animar portal
            portalRing.rotation.y += 0.01;
            portalRing.rotation.z += 0.005;

            stars.rotation.y += 0.0001;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
